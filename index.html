  amber:  { bg: "#FAEEDA", border: "#EF9F27", text: "#633806", mid: "#BA7517" },
  green:  { bg: "#EAF3DE", border: "#97C459", text: "#27500A", mid: "#639922" },
  pink:   { bg: "#FBE7EE", border: "#F09BBC", text: "#7A1F44", mid: "#D54B82" },
  sky:    { bg: "#E2EFFB", border: "#8AB8E8", text: "#0E3A66", mid: "#3C82C7" },
};
const CAT_OPTIONS = ["Work","Personal","Health","Learning","Other"];
const CAT_COLOR = { Work:"purple", Personal:"teal", Health:"coral", Learning:"amber", Other:"green" };
const URGENCY_OPTIONS = ["Low","Medium","High","Critical"];

function load(k,fb){ try{ const v=localStorage.getItem(k); return v?JSON.parse(v):fb; }catch{ return fb; } }
function save(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch{} }
function today(){ return new Date().toISOString().slice(0,10); }
function fmt(secs){ const h=Math.floor(secs/3600),m=Math.floor((secs%3600)/60),s=secs%60; if(h>0)return`${h}h ${m}m`; return`${m}m ${s}s`; }
function fmtClock(secs){ const m=Math.floor(secs/60),s=secs%60; return `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`; }
 
// ============ XP SYSTEM ============
// xpForLevel(n) -> xp needed to go from level n to n+1 (always 70 per current spec)
const XP_PER_LEVEL = 70;
const XP_PER_ACTION = 5;
const MAX_LEVEL = 100;
 
function useXP() {
  const [xp,setXp] = useState(()=>load("pd_xp",{level:1, xp:0, totalGained:0}));
  const [inv,setInv] = useState(()=>load("pd_inventory",[])); // list of {id, level}
  const [room,setRoom] = useState(()=>load("pd_room",[])); // list of {id, x, y}
  const [flash,setFlash] = useState(null);
  useEffect(()=>save("pd_xp",xp),[xp]);
  useEffect(()=>save("pd_inventory",inv),[inv]);
  useEffect(()=>save("pd_room",room),[room]);
 
  function addXP(amount){
    setXp(prev=>{
      if(prev.level>=MAX_LEVEL && prev.xp>=XP_PER_LEVEL) return prev;
      let newLevel = prev.level;
      let newXp = prev.xp + amount;
      const unlocked = [];
      while(newXp >= XP_PER_LEVEL && newLevel < MAX_LEVEL){
        newXp -= XP_PER_LEVEL;
        newLevel += 1;
        unlocked.push(newLevel);
      }
      if(newLevel>=MAX_LEVEL){ newXp = Math.min(newXp, XP_PER_LEVEL); }
      if(unlocked.length){
        setInv(curr=>[...curr, ...unlocked.map(l=>({id:`furn_${l}_${Date.now()}_${l}`, level:l}))]);
        setFlash(unlocked[unlocked.length-1]);
        setTimeout(()=>setFlash(null), 2200);
      }
      return { level:newLevel, xp:newXp, totalGained:prev.totalGained+amount };
    });
  }
  function removeXP(amount){
    setXp(prev=>{
      let newLevel = prev.level;
      let newXp = prev.xp - amount;
      const levelsLost = []; // levels we are un-gaining (the level numbers the items were tied to)
      while(newXp < 0 && newLevel > 1){
        levelsLost.push(newLevel); // current level's reward gets revoked
        newLevel -= 1;
        newXp += XP_PER_LEVEL;
      }
      if(newXp<0) newXp = 0;
      if(levelsLost.length){
        // remove items for those levels — prefer inventory first, then room
        setInv(curr=>{
          const remaining = [...curr];
          const stillToRemove = [];
          for(const lvl of levelsLost){
            const idx = remaining.map(x=>x.level).lastIndexOf(lvl);
            if(idx!==-1){ remaining.splice(idx,1); }
            else { stillToRemove.push(lvl); }
          }
          if(stillToRemove.length){
            setRoom(rc=>{
              const rem = [...rc];
              for(const lvl of stillToRemove){
                const idx = rem.map(x=>x.level).lastIndexOf(lvl);
                if(idx!==-1) rem.splice(idx,1);
              }
              return rem;
            });
          }
          return remaining;
        });
      }
      return { level:newLevel, xp:newXp, totalGained:Math.max(0,prev.totalGained-amount) };
    });
  }
  return { xp, inv, setInv, room, setRoom, addXP, removeXP, flash };
}
 
// ============ FURNITURE (100 items, level-gated) ============
// Each item: name + an SVG renderer. Minimalist cute, same palette as app.
// We define 20 base archetypes and scale up to 100 by colour variations.
const FURN_NAMES = [
  "Cushion","Plant","Lamp","Bookshelf","Rug","Cat","Clock","Painting","Chair","Table",
  "Window","Mug","Candle","Plushie","Bed","Mirror","Vase","Stool","Curtain","Mushroom"
];
const FURN_PALETTE = ["purple","teal","coral","amber","green","pink","sky"]; // 7 hues for variety
 
function furnitureFor(level){
  // 100 levels => name index = (level-1) % 20, palette = floor((level-1)/20) cycles through colours
  const nameIdx = (level-1) % FURN_NAMES.length;
  const tier = Math.floor((level-1) / FURN_NAMES.length); // 0..4 (5 tiers)
  const palette = FURN_PALETTE[(nameIdx + tier*3) % FURN_PALETTE.length];
  const tierLabels = ["","II","III","IV","V"];
  const name = FURN_NAMES[nameIdx] + (tier>0?` ${tierLabels[tier]}`:"");
  return { name, palette, archetype: FURN_NAMES[nameIdx], tier };
}

// ============ ANTI-SPAM TRACKING ============
// For one-shot daily actions (habit checks, todo completion, water goal reached):
// Once XP awarded for an action key, awarding again is a no-op until unlock condition resets.
// Uncheck/un-complete -> remove XP and remove the award key so re-check still won't double-award.
// This is enforced by maintaining a Set of award keys in localStorage.
 
function useAwards(){
  const [awards,setAwards] = useState(()=>load("pd_awards",{}));
  useEffect(()=>save("pd_awards",awards),[awards]);
  function has(key){ return !!awards[key]; }
  function add(key){ setAwards(a=>({...a,[key]:Date.now()})); }
  function remove(key){ setAwards(a=>{ const n={...a}; delete n[key]; return n; }); }
  return { has, add, remove, awards };
}
 
// ============ THEME / SETTINGS ============
const ThemeCtx = React.createContext(null);
function useTheme(){ return React.useContext(ThemeCtx); }

}

// ============================================================
function Todos({ xpApi, awards }) {
  const [todos,setTodos]=useState(()=>load("pd_todos",[]));
  const [text,setText]=useState(""); const [due,setDue]=useState(""); const [cat,setCat]=useState("Work"); const [urgency,setUrgency]=useState("Medium");
  const [filter,setFilter]=useState("All");
  const [settings,setSettings]=useState(()=>load("pd_todos_settings",{theme:"purple"}));
  const [settingsOpen,setSettingsOpen]=useState(false);
  useEffect(()=>save("pd_todos",todos),[todos]);
  useEffect(()=>save("pd_todos_settings",settings),[settings]);
  function add(){ if(!text.trim())return; setTodos(t=>[...t,{id:Date.now(),text:text.trim(),due,cat,urgency,done:false}]); setText(""); setDue(""); setUrgency("Medium"); }
  function toggle(id){
    setTodos(t=>t.map(x=>{
      if(x.id!==id) return x;
      const newDone = !x.done;
      const key = `todo_done_${x.id}`;
      if(newDone){
        if(!awards.has(key)){ xpApi.addXP(XP_PER_ACTION); awards.add(key); }
      } else {
        if(awards.has(key)){ xpApi.removeXP(XP_PER_ACTION); awards.remove(key); }
      }
      return {...x,done:newDone};
    }));
  }
  function remove(id){
    const t = todos.find(x=>x.id===id);
    if(t){
      const key = `todo_done_${t.id}`;
      if(t.done && awards.has(key)){ xpApi.removeXP(XP_PER_ACTION); awards.remove(key); }
    }
    setTodos(t=>t.filter(x=>x.id!==id));
  }
  const td=today();
  const sorted = useMemo(()=>{
    const arr = [...todos];
    arr.sort((a,b)=>{
      if(a.done !== b.done) return a.done?1:-1;
      const ua = URGENCY_RANK[a.urgency||"Medium"];
      const ub = URGENCY_RANK[b.urgency||"Medium"];
      if(ua!==ub) return ua-ub;
      // within urgency: closer date first; no date last
      if(a.due && b.due) return a.due.localeCompare(b.due);
      if(a.due) return -1;
      if(b.due) return 1;
      return a.id-b.id;
    });
    return arr;
  },[todos]);
  const filtered=sorted.filter(t=>filter==="All"?true:filter==="Active"?!t.done:t.done);
  const overdue=todos.filter(t=>!t.done&&t.due&&t.due<td).length;
  const col = COLORS[settings.theme];
  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <div style={{display:"flex",justifyContent:"flex-end"}}><SettingsButton open={settingsOpen} onToggle={()=>setSettingsOpen(s=>!s)} color={settings.theme}/></div>
      {settingsOpen&&<ThemeSettingsCard value={settings.theme} onChange={v=>setSettings(s=>({...s,theme:v}))} />}
      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        <Inp placeholder="What needs to be done?" value={text} onChange={setText} style={{flex:1,minWidth:140}} />
        <input type="date" value={due} onChange={e=>setDue(e.target.value)} />
        <Sel value={cat} onChange={setCat} options={CAT_OPTIONS} />
        <Sel value={urgency} onChange={setUrgency} options={URGENCY_OPTIONS} />
        <button onClick={add} style={{borderRadius:14,padding:"8px 20px",background:col.mid,color:"#fff",border:"none",fontWeight:500,fontSize:14,cursor:"pointer"}}>Add</button>
      </div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
        {["All","Active","Done"].map(f=><Pill key={f} active={filter===f} onClick={()=>setFilter(f)} color={settings.theme}>{f}</Pill>)}
        {overdue>0&&<span style={{marginLeft:"auto",fontSize:13,color:COLORS.coral.text,background:COLORS.coral.bg,borderRadius:20,padding:"3px 10px",border:`1px solid ${COLORS.coral.border}`}}>{overdue} overdue</span>}
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {filtered.length===0&&<p style={{color:"#888780",fontSize:14,textAlign:"center",padding:"1.5rem 0"}}>Nothing here yet</p>}
        {filtered.map(t=>{
          const ov=!t.done&&t.due&&t.due<td;
          return <Card key={t.id} style={{display:"flex",alignItems:"center",gap:10,padding:"12px 16px",opacity:t.done?.6:1,flexWrap:"wrap"}}>
            <input type="checkbox" checked={t.done} onChange={()=>toggle(t.id)} style={{width:18,height:18,flexShrink:0,cursor:"pointer",accentColor:col.mid}} />
            <div style={{flex:1,minWidth:120}}>
              <span style={{fontSize:15,textDecoration:t.done?"line-through":"none"}}>{t.text}</span>
              {t.due&&<span style={{marginLeft:8,fontSize:12,color:ov?COLORS.coral.text:"#888780"}}>{t.due}</span>}
            </div>
            <UrgencyBadge u={t.urgency||"Medium"} />
            <Badge cat={t.cat} />
            <button onClick={()=>remove(t.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#888780",fontSize:18,lineHeight:1,padding:"2px 4px",borderRadius:8}}>×</button>
          </Card>;
        })}
      </div>
      <div style={{display:"flex",gap:12}}>
        {[{v:todos.filter(t=>!t.done).length,l:"remaining"},{v:todos.filter(t=>t.done).length,l:"completed"},{v:(todos.length?Math.round(todos.filter(t=>t.done).length/todos.length*100):0)+"%",l:"done"}].map(({v,l})=>
          <div key={l} className="metric" style={{flex:1,textAlign:"center",background:"#f1efe8",borderRadius:16,padding:"12px 8px"}}>
            <p style={{fontSize:22,fontWeight:500,margin:0}}>{v}</p>
            <p style={{fontSize:12,color:"#888780",margin:0}}>{l}</p>
          </div>)}
      </div>
    </div>
  );
}
 
// ============================================================
// TIME TRACKER (count up OR count down)
// ============================================================
function TimeTracker({ xpApi, awards }) {
  const [entries,setEntries]=useState(()=>load("pd_time",[]));
  const [activity,setActivity]=useState(""); const [cat,setCat]=useState("Work");
  const [running,setRunning]=useState(null); const [elapsed,setElapsed]=useState(0);
  const [settings,setSettings]=useState(()=>load("pd_time_settings",{theme:"teal",mode:"up",cdMinutes:25}));
  const [settingsOpen,setSettingsOpen]=useState(false);
  const ref=useRef(null);
  const completedRef = useRef(false);
  useEffect(()=>save("pd_time",entries),[entries]);
  useEffect(()=>save("pd_time_settings",settings),[settings]);
 
  useEffect(()=>{
    if(running){
      ref.current=setInterval(()=>{
        const elapsedSec = Math.floor((Date.now()-running.startMs)/1000);
        setElapsed(elapsedSec);
        if(running.mode==="down" && elapsedSec >= running.totalSec && !completedRef.current){
          completedRef.current = true;
          // auto-stop & award
          finishSession(running.totalSec);
        }
      },250);
    } else {
      clearInterval(ref.current);
    }
    return ()=>clearInterval(ref.current);
  },[running]);
 
  function finishSession(secs){
    if(secs>0){
      const id = Date.now();
      setEntries(e=>[...e,{id,activity:running.activity,cat:running.cat,secs,date:today(),mode:running.mode}]);
      // award XP for each completed session
      xpApi.addXP(XP_PER_ACTION);
    }
    setRunning(null);
    setElapsed(0);
    completedRef.current = false;
  }
 
  function startStop(){
    if(running){
      const elapsedSec = Math.floor((Date.now()-running.startMs)/1000);
      const recorded = running.mode==="down" ? Math.min(elapsedSec, running.totalSec) : elapsedSec;
      finishSession(recorded);
    } else {
      if(!activity.trim()) return;
      const totalSec = settings.mode==="down" ? Math.max(60, settings.cdMinutes*60) : 0;
      setRunning({activity:activity.trim(),cat,startMs:Date.now(),mode:settings.mode,totalSec});
      setElapsed(0);
      completedRef.current = false;
    }
  }
 
  function remove(id){
    // removing logged session — withdraw the XP awarded for it
    const e = entries.find(x=>x.id===id);
    if(e){ xpApi.removeXP(XP_PER_ACTION); }
    setEntries(arr=>arr.filter(x=>x.id!==id));
  }
  const td=today(); const todayE=entries.filter(e=>e.date===td);
  const todayS=todayE.reduce((a,e)=>a+e.secs,0); const totalS=entries.reduce((a,e)=>a+e.secs,0);
  const byCat=CAT_OPTIONS.map(c=>({cat:c,secs:entries.filter(e=>e.cat===c).reduce((a,e)=>a+e.secs,0)})).filter(x=>x.secs>0);
  const col = COLORS[settings.theme];
  const remainingSec = running && running.mode==="down" ? Math.max(0, running.totalSec - elapsed) : elapsed;
  const cdPct = running && running.mode==="down" ? Math.min(100, (elapsed/running.totalSec)*100) : 0;
  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <div style={{display:"flex",justifyContent:"flex-end"}}><SettingsButton open={settingsOpen} onToggle={()=>setSettingsOpen(s=>!s)} color={settings.theme}/></div>
      {settingsOpen&&<Card>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <p style={{fontSize:13,fontWeight:500,color:"#888780",margin:0}}>Timer settings</p>
          <div style={{display:"flex",gap:8}}>
            <Pill active={settings.mode==="up"} onClick={()=>setSettings(s=>({...s,mode:"up"}))} color={settings.theme}>Count up</Pill>
            <Pill active={settings.mode==="down"} onClick={()=>setSettings(s=>({...s,mode:"down"}))} color={settings.theme}>Count down</Pill>
          </div>
          {settings.mode==="down"&&<div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:14,flex:1}}>Countdown length</span>
            <input type="number" value={settings.cdMinutes} min={1} max={180} onChange={e=>setSettings(s=>({...s,cdMinutes:Math.max(1,parseInt(e.target.value)||25)}))} style={{width:80}} />
            <span style={{fontSize:13,color:"#888780"}}>min</span>
          </div>}
          <div>
            <p style={{fontSize:14,marginBottom:8}}>Colour theme</p>
            <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
              {Object.keys(COLORS).map(t=>(
                <button key={t} onClick={()=>setSettings(s=>({...s,theme:t}))} style={{width:30,height:30,borderRadius:"50%",background:COLORS[t].mid,border:settings.theme===t?`3px solid ${COLORS[t].text}`:"3px solid transparent",cursor:"pointer",outline:"none",padding:0,boxShadow:settings.theme===t?`0 0 0 2px ${COLORS[t].bg}`:"none"}} />
              ))}
            </div>
          </div>
        </div>
      </Card>}
      <Card style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
        <Inp placeholder="Activity name" value={activity} onChange={setActivity} style={{flex:1,minWidth:140}} />
        <Sel value={cat} onChange={setCat} options={CAT_OPTIONS} />
        <button onClick={startStop} style={{borderRadius:14,padding:"8px 22px",background:running?COLORS.coral.mid:col.mid,color:"#fff",border:"none",fontWeight:500,fontSize:14,cursor:"pointer",minWidth:80}}>{running?"Stop":"Start"}</button>
      </Card>
      {running&&<Card style={{textAlign:"center",background:col.bg,border:`1px solid ${col.border}`}}>
        <p style={{fontSize:13,color:col.text,margin:"0 0 4px"}}>{running.mode==="down"?"Counting down":"Tracking"}: {running.activity}</p>
        <p style={{fontSize:36,fontWeight:500,margin:"4px 0",color:col.text,fontVariantNumeric:"tabular-nums"}}>{running.mode==="down"?fmtClock(remainingSec):fmt(elapsed)}</p>
        {running.mode==="down"&&<div className="bar-bg" style={{height:6,borderRadius:20,background:"#e8e6e0",overflow:"hidden",marginTop:8}}><div style={{height:"100%",width:`${cdPct}%`,background:col.mid,borderRadius:20,transition:"width 0.25s"}}/></div>}
      </Card>}
      <div style={{display:"flex",gap:12}}>
        {[{v:fmt(todayS),l:"today"},{v:fmt(totalS),l:"total"},{v:todayE.length,l:"sessions today"}].map(({v,l})=>
          <div key={l} className="metric" style={{flex:1,textAlign:"center",background:"#f1efe8",borderRadius:16,padding:"12px 8px"}}>
            <p style={{fontSize:22,fontWeight:500,margin:0}}>{v}</p>
            <p style={{fontSize:12,color:"#888780",margin:0}}>{l}</p>
          </div>)}
      </div>
      {byCat.length>0&&<Card>
        <p style={{fontSize:13,fontWeight:500,margin:"0 0 10px",color:"#888780"}}>Time by category</p>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {byCat.map(({cat:c,secs})=>{ const pct=totalS?Math.round(secs/totalS*100):0; const ccol=COLORS[CAT_COLOR[c]||"green"]; return(
            <div key={c}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:3}}><span>{c}</span><span style={{color:"#888780"}}>{fmt(secs)} · {pct}%</span></div>
              <div className="bar-bg" style={{height:8,borderRadius:20,background:"#e8e6e0",overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:ccol.mid,borderRadius:20}}/></div>
            </div>);})}
        </div>
      </Card>}
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        <p style={{fontSize:13,fontWeight:500,color:"#888780"}}>Log</p>
        {entries.length===0&&<p style={{color:"#888780",fontSize:14,textAlign:"center",padding:"1.5rem 0"}}>No sessions logged yet</p>}
        {[...entries].reverse().map(e=>(
          <Card key={e.id} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 16px",borderRadius:16}}>
            <div style={{flex:1}}><span style={{fontSize:14}}>{e.activity}</span><span style={{marginLeft:8,fontSize:12,color:"#888780"}}>{e.date}</span></div>
            <Badge cat={e.cat} />
            <span style={{fontWeight:500,fontSize:14,minWidth:56,textAlign:"right"}}>{fmt(e.secs)}</span>
            <button onClick={()=>remove(e.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#888780",fontSize:18,lineHeight:1,padding:"2px 4px",borderRadius:8}}>×</button>
          </Card>))}
      </div>
    </div>
  );
}

// HABITS
// ============================================================
function Habits({ xpApi, awards }) {
  const [habits,setHabits]=useState(()=>load("pd_habits",[]));
  const [name,setName]=useState(""); const [cat,setCat]=useState("Health");
  const [settings,setSettings]=useState(()=>load("pd_habits_settings",{theme:"coral"}));
  const [settingsOpen,setSettingsOpen]=useState(false);
  const td=today();
  useEffect(()=>save("pd_habits",habits),[habits]);
  useEffect(()=>save("pd_habits_settings",settings),[settings]);
  function add(){ if(!name.trim())return; setHabits(h=>[...h,{id:Date.now(),name:name.trim(),cat,completions:[]}]); setName(""); }
  function toggle(id){
    setHabits(h=>h.map(x=>{
      if(x.id!==id) return x;
      const d=x.completions.includes(td);
      const key = `habit_${x.id}_${td}`;
      if(d){
        // unchecking
        if(awards.has(key)){ xpApi.removeXP(XP_PER_ACTION); awards.remove(key); }
        return {...x,completions:x.completions.filter(c=>c!==td)};
      } else {
        if(!awards.has(key)){ xpApi.addXP(XP_PER_ACTION); awards.add(key); }
        return {...x,completions:[...x.completions,td]};
      }
    }));
  }
  function remove(id){
    const h = habits.find(x=>x.id===id);
    if(h){
      // remove any awards keyed to this habit (only today's matters, but be safe)
      h.completions.forEach(d=>{
        const key=`habit_${h.id}_${d}`;
        if(awards.has(key) && d===td){ xpApi.removeXP(XP_PER_ACTION); }
        awards.remove(key);
      });
    }
    setHabits(arr=>arr.filter(x=>x.id!==id));
  }
  function streak(c){ let s=0,d=new Date(); while(true){ const ds=d.toISOString().slice(0,10); if(c.includes(ds)){s++;d.setDate(d.getDate()-1);}else break; } return s; }
  const last7=Array.from({length:7},(_,i)=>{ const d=new Date(); d.setDate(d.getDate()-(6-i)); return d.toISOString().slice(0,10); });
  const doneToday=habits.filter(h=>h.completions.includes(td)).length;
  const col = COLORS[settings.theme];
  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <div style={{display:"flex",justifyContent:"flex-end"}}><SettingsButton open={settingsOpen} onToggle={()=>setSettingsOpen(s=>!s)} color={settings.theme}/></div>
      {settingsOpen&&<ThemeSettingsCard value={settings.theme} onChange={v=>setSettings(s=>({...s,theme:v}))} />}
      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        <Inp placeholder="New habit" value={name} onChange={setName} style={{flex:1,minWidth:160}} />
        <Sel value={cat} onChange={setCat} options={CAT_OPTIONS} />
        <button onClick={add} style={{borderRadius:14,padding:"8px 20px",background:col.mid,color:"#fff",border:"none",fontWeight:500,fontSize:14,cursor:"pointer"}}>Add</button>
      </div>
      <div style={{display:"flex",gap:12}}>
        {[{v:`${doneToday}/${habits.length}`,l:"done today"},{v:`${habits.length?Math.round(doneToday/habits.length*100):0}%`,l:"completion rate"},{v:habits.reduce((a,h)=>Math.max(a,streak(h.completions)),0),l:"best streak"}].map(({v,l})=>
          <div key={l} className="metric" style={{flex:1,textAlign:"center",background:"#f1efe8",borderRadius:16,padding:"12px 8px"}}>
            <p style={{fontSize:22,fontWeight:500,margin:0}}>{v}</p>
            <p style={{fontSize:12,color:"#888780",margin:0}}>{l}</p>
          </div>)}
      </div>
      {habits.length===0&&<p style={{color:"#888780",fontSize:14,textAlign:"center",padding:"1.5rem 0"}}>Add your first habit above</p>}
      {habits.map(h=>{
        const done=h.completions.includes(td); const s=streak(h.completions); const ccol=COLORS[CAT_COLOR[h.cat]||"green"];
        return <Card key={h.id}>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10,flexWrap:"wrap"}}>
            <button onClick={()=>toggle(h.id)} style={{width:28,height:28,borderRadius:50,border:`2px solid ${done?ccol.mid:"#d3d1c7"}`,background:done?ccol.mid:"transparent",cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:16}}>{done?"✓":""}</button>
            <span style={{flex:1,fontSize:15,minWidth:120}}>{h.name}</span>
            <Badge cat={h.cat} />
            {s>0&&<span style={{fontSize:13,color:COLORS.amber.text,background:COLORS.amber.bg,borderRadius:20,padding:"2px 10px",border:`1px solid ${COLORS.amber.border}`}}>{s} day streak</span>}
            <button onClick={()=>remove(h.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#888780",fontSize:18,lineHeight:1,padding:"2px 4px",borderRadius:8}}>×</button>
          </div>
          <div style={{display:"flex",gap:5}}>
            {last7.map(d=>{ const f=h.completions.includes(d); const it=d===td; return <div key={d} style={{flex:1,height:10,borderRadius:10,background:f?ccol.mid:"#e8e6e0",border:it?`1.5px solid ${ccol.border}`:"none"}}/>; })}
          </div>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
            {last7.map(d=><span key={d} style={{flex:1,fontSize:10,color:"#888780",textAlign:"center"}}>{"SMTWTFS"[new Date(d).getDay()]}</span>)}
          </div>
        </Card>;
      })}
    </div>
  );
}
 
// ============================================================
// HYDRATION (with anti-spam goal award)
// ============================================================
function Hydration({ xpApi, awards }) {
  const [settings,setSettings]=useState(()=>load("pd_hydration",{portion:250,goal:2000,theme:"teal"}));
  const [log,setLog]=useState(()=>load("pd_hydration_log",[]));
  const [settingsOpen,setSettingsOpen]=useState(false);
  const td=today();
  useEffect(()=>save("pd_hydration",settings),[settings]);
  useEffect(()=>save("pd_hydration_log",log),[log]);
  const todayE=log.filter(e=>e.date===td);
  const todayMl=todayE.reduce((a,e)=>a+e.ml,0);
  const pct=Math.min(100,Math.round(todayMl/settings.goal*100));
  const col=COLORS[settings.theme]||COLORS.teal;
 
  // award when goal reached today, refund if drops below
  useEffect(()=>{
    const key = `water_goal_${td}`;
    if(todayMl >= settings.goal && !awards.has(key)){
      xpApi.addXP(XP_PER_ACTION);
      awards.add(key);
    } else if(todayMl < settings.goal && awards.has(key)){
      xpApi.removeXP(XP_PER_ACTION);
      awards.remove(key);
    }
  },[todayMl, settings.goal]);
 
  function addWater(){setLog(l=>[...l,{id:Date.now(),ml:settings.portion,date:td}]);}
  function removeWater(){if(!todayE.length)return;const last=todayE[todayE.length-1];setLog(l=>l.filter(e=>e.id!==last.id));}
  const cx=100,cy=100,r=85;
  const fillH=Math.round(r*2*pct/100);
  const fillY=(cy+r)-fillH;
  const textOnWater=pct>=52;
  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <div style={{display:"flex",justifyContent:"flex-end"}}><SettingsButton open={settingsOpen} onToggle={()=>setSettingsOpen(s=>!s)} color={settings.theme}/></div>
      {settingsOpen&&<Card>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <p style={{fontSize:13,fontWeight:500,color:"#888780",margin:0}}>Hydration settings</p>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:14,flex:1}}>Portion size</span>
            <Sel value={String(settings.portion)} onChange={v=>setSettings(s=>({...s,portion:parseInt(v)}))} options={["125","250","500"]} />
            <span style={{fontSize:13,color:"#888780"}}>ml</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:14,flex:1}}>Daily goal</span>
            <input type="number" value={settings.goal} min={250} max={10000} step={250} onChange={e=>setSettings(s=>({...s,goal:Math.max(250,parseInt(e.target.value)||2000)}))} style={{width:80}} />
            <span style={{fontSize:13,color:"#888780"}}>ml</span>
          </div>
          <div>
            <p style={{fontSize:14,marginBottom:8}}>Colour theme</p>
            <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
              {Object.keys(COLORS).map(t=>(
                <button key={t} onClick={()=>setSettings(s=>({...s,theme:t}))} style={{width:30,height:30,borderRadius:"50%",background:COLORS[t].mid,border:settings.theme===t?`3px solid ${COLORS[t].text}`:"3px solid transparent",cursor:"pointer",outline:"none",padding:0,boxShadow:settings.theme===t?`0 0 0 2px ${COLORS[t].bg}`:"none"}} />
              ))}
            </div>
          </div>
        </div>
      </Card>}
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:20,padding:"0.5rem 0"}}>
        <div style={{position:"relative",width:200,height:200}}>
          <svg width="200" height="200" viewBox="0 0 200 200">
            <defs><clipPath id="hydrationClip"><circle cx={cx} cy={cy} r={r}/></clipPath></defs>
            <circle cx={cx} cy={cy} r={r} fill={col.bg}/>
            {pct>0&&<path
              d={pct>=99
                ?`M ${cx-r} ${fillY} L ${cx+r} ${fillY} L ${cx+r} ${cy+r+2} L ${cx-r} ${cy+r+2} Z`
                :`M ${cx-r} ${fillY} Q ${cx-r/2} ${fillY-8} ${cx} ${fillY} Q ${cx+r/2} ${fillY+8} ${cx+r} ${fillY} L ${cx+r} ${cy+r+2} L ${cx-r} ${cy+r+2} Z`
              }
              fill={col.mid} opacity="0.55" clipPath="url(#hydrationClip)"
            />}
            <circle cx={cx} cy={cy} r={r} fill="none" stroke={col.border} strokeWidth="2.5"/>
          </svg>
          <div style={{position:"absolute",top:0,left:0,width:"100%",height:"100%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",pointerEvents:"none"}}>

const MOODS = [
  { key:"very_bad", label:"Very bad", color:"coral" },
  { key:"bad",      label:"Bad",      color:"amber" },
  { key:"neutral",  label:"Neutral",  color:"purple" },
  { key:"good",     label:"Good",     color:"teal" },
  { key:"excellent",label:"Excellent",color:"green" },
];
 
function MoodFace({ moodKey, size=44, glow=false }){
  const m = MOODS.find(x=>x.key===moodKey);
  if(!m) return null;
  const c = COLORS[m.color];
  // mouth path differs per mood
  let mouth;
  if(moodKey==="very_bad") mouth = <path d="M22 42 Q32 34 42 42" stroke={c.text} strokeWidth="2" fill="none" strokeLinecap="round"/>;
  else if(moodKey==="bad") mouth = <path d="M24 41 Q32 37 40 41" stroke={c.text} strokeWidth="2" fill="none" strokeLinecap="round"/>;
  else if(moodKey==="neutral") mouth = <line x1="24" y1="40" x2="40" y2="40" stroke={c.text} strokeWidth="2" strokeLinecap="round"/>;
  else if(moodKey==="good") mouth = <path d="M24 38 Q32 44 40 38" stroke={c.text} strokeWidth="2" fill="none" strokeLinecap="round"/>;
  else mouth = <path d="M22 36 Q32 48 42 36" stroke={c.text} strokeWidth="2" fill="none" strokeLinecap="round"/>;
  return <svg width={size} height={size} viewBox="0 0 64 64" style={{display:"block",filter:glow?`drop-shadow(0 0 4px ${c.mid})`:"none"}}>
    <circle cx="32" cy="32" r="26" fill={c.bg} stroke={c.border} strokeWidth="1.5"/>
    <circle cx="24" cy="28" r="2.5" fill={c.text}/>
    <circle cx="40" cy="28" r="2.5" fill={c.text}/>
    {moodKey==="excellent" && <>
      <path d="M14 22 Q12 18 16 18" stroke={c.mid} strokeWidth="1.5" fill="none"/>
      <path d="M50 22 Q52 18 48 18" stroke={c.mid} strokeWidth="1.5" fill="none"/>
    </>}
    {mouth}
  </svg>;
}
 
function MoodLogger() {
  const [entries,setEntries]=useState(()=>load("pd_mood",{})); // {YYYY-MM-DD: moodKey}
  const [settings,setSettings]=useState(()=>load("pd_mood_settings",{theme:"pink"}));
  const [settingsOpen,setSettingsOpen]=useState(false);
  const [viewMonth,setViewMonth]=useState(()=>{ const d=new Date(); return {y:d.getFullYear(),m:d.getMonth()}; });
  useEffect(()=>save("pd_mood",entries),[entries]);
  useEffect(()=>save("pd_mood_settings",settings),[settings]);
  const td = today();
  const todays = entries[td];
  function pick(key){ setEntries(e=>({...e, [td]:key})); }
  const col = COLORS[settings.theme];
 
  // calendar grid
  const firstDay = new Date(viewMonth.y, viewMonth.m, 1);
  const daysInMonth = new Date(viewMonth.y, viewMonth.m+1, 0).getDate();
  const startOffset = firstDay.getDay(); // 0=Sun
  const cells = [];
  for(let i=0;i<startOffset;i++) cells.push(null);
  for(let d=1; d<=daysInMonth; d++){
    const ds = `${viewMonth.y}-${String(viewMonth.m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    cells.push({ d, ds, mood: entries[ds] });
  }
  const monthName = new Date(viewMonth.y, viewMonth.m, 1).toLocaleString("en",{month:"long",year:"numeric"});
  function prevMonth(){ setViewMonth(v=>{ const m=v.m-1; if(m<0) return {y:v.y-1,m:11}; return {y:v.y,m}; }); }
  function nextMonth(){ setViewMonth(v=>{ const m=v.m+1; if(m>11) return {y:v.y+1,m:0}; return {y:v.y,m}; }); }
 
  // stats
  const moodCounts = MOODS.map(m=>({...m, count:Object.values(entries).filter(v=>v===m.key).length}));
  const totalLogged = Object.keys(entries).length;
 
  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <div style={{display:"flex",justifyContent:"flex-end"}}><SettingsButton open={settingsOpen} onToggle={()=>setSettingsOpen(s=>!s)} color={settings.theme}/></div>
      {settingsOpen&&<ThemeSettingsCard value={settings.theme} onChange={v=>setSettings(s=>({...s,theme:v}))} />}
      <Card>
        <p style={{fontSize:13,fontWeight:500,color:"#888780",margin:"0 0 14px",textAlign:"center"}}>How are you feeling today?</p>
        <div style={{display:"flex",justifyContent:"space-between",gap:8,alignItems:"flex-end"}}>
          {MOODS.map(m=>(
            <button key={m.key} onClick={()=>pick(m.key)} style={{background:"none",border:"none",padding:0,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:4,flex:1,opacity:todays&&todays!==m.key?0.4:1,transform:todays===m.key?"scale(1.08)":"scale(1)",transition:"all 0.2s"}}>
              <MoodFace moodKey={m.key} size={48} glow={todays===m.key}/>
              <span style={{fontSize:11,color:todays===m.key?COLORS[m.color].text:"#888780",fontWeight:todays===m.key?500:400}}>{m.label}</span>
            </button>
          ))}
        </div>
        {todays&&<p style={{fontSize:12,color:"#888780",textAlign:"center",marginTop:14}}>Logged for today · tap a different face to change</p>}
      </Card>
 
      <Card>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
          <button onClick={prevMonth} style={{background:"none",border:"none",cursor:"pointer",fontSize:18,color:"#888780",padding:"2px 8px",borderRadius:8}}>‹</button>
          <p style={{fontSize:14,fontWeight:500,margin:0}}>{monthName}</p>
          <button onClick={nextMonth} style={{background:"none",border:"none",cursor:"pointer",fontSize:18,color:"#888780",padding:"2px 8px",borderRadius:8}}>›</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:6}}>
          {["S","M","T","W","T","F","S"].map((d,i)=><div key={i} style={{textAlign:"center",fontSize:10,color:"#aaa8a2"}}>{d}</div>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
          {cells.map((cell,i)=>{
            if(!cell) return <div key={i}/>;
            const isToday = cell.ds===td;
            return <div key={i} style={{aspectRatio:"1/1",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",borderRadius:10,background:isToday?col.bg:"transparent",border:isToday?`1px solid ${col.border}`:"1px solid transparent",gap:1,padding:2}}>
              <span style={{fontSize:9,color:"#aaa8a2",lineHeight:1}}>{cell.d}</span>
              {cell.mood && <MoodFace moodKey={cell.mood} size={22}/>}
            </div>;
          })}
        </div>
      </Card>
 
      <Card>
        <p style={{fontSize:13,fontWeight:500,color:"#888780",margin:"0 0 10px"}}>All-time mood</p>
        <div style={{display:"flex",justifyContent:"space-between",gap:8}}>
          {moodCounts.map(m=>(
            <div key={m.key} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
              <MoodFace moodKey={m.key} size={28}/>
              <span style={{fontSize:14,fontWeight:500,color:COLORS[m.color].text}}>{m.count}</span>
            </div>
          ))}

        <p style={{fontSize:11,color:"#aaa8a2",textAlign:"center",marginTop:10}}>{totalLogged} days logged</p>
      </Card>
    </div>
  );
}

function MySpace({ xpApi }) {
  const { inv, setInv, room, setRoom, xp } = xpApi;
  const [bagOpen,setBagOpen]=useState(false);
  const roomRef = useRef(null);
  const [drag,setDrag]=useState(null); // {id, source: 'room'|'inv', x, y, offsetX, offsetY}
 
  // Touch/mouse drag handling
  useEffect(()=>{
    if(!drag) return;
    function move(e){
      const ev = e.touches ? e.touches[0] : e;
      setDrag(d=>d?{...d,x:ev.clientX,y:ev.clientY}:d);
    }
    function up(e){
      const ev = e.changedTouches ? e.changedTouches[0] : e;
      const x = ev.clientX, y = ev.clientY;
      // check if dropped on bag icon
      const bag = document.getElementById("bag-icon");
      if(bag){
        const r = bag.getBoundingClientRect();
        if(x>=r.left && x<=r.right && y>=r.top && y<=r.bottom){
          // move to inventory
          if(drag.source==="room"){
            setRoom(rm=>{
              const item = rm.find(i=>i.id===drag.id);
              if(item){ setInv(iv=>[...iv,{id:item.id, level:item.level}]); }
              return rm.filter(i=>i.id!==drag.id);
            });
          }
          setDrag(null);
          return;
        }
      }
      // dropped on room?
      if(roomRef.current){
        const r = roomRef.current.getBoundingClientRect();
        if(x>=r.left && x<=r.right && y>=r.top && y<=r.bottom){
          const px = ((x - r.left - drag.offsetX) / r.width) * 100;
          const py = ((y - r.top - drag.offsetY) / r.height) * 100;
          const clampedX = Math.max(0, Math.min(85, px));
          const clampedY = Math.max(0, Math.min(85, py));
          if(drag.source==="inv"){
            // move from inv to room
            setInv(iv=>{
              const item = iv.find(i=>i.id===drag.id);
              if(item){ setRoom(rm=>[...rm,{id:item.id,level:item.level,x:clampedX,y:clampedY}]); }
              return iv.filter(i=>i.id!==drag.id);
            });
          } else {
            // reposition in room
            setRoom(rm=>rm.map(i=>i.id===drag.id?{...i,x:clampedX,y:clampedY}:i));
          }
        }
      }
      setDrag(null);
    }
    window.addEventListener("mousemove",move);
    window.addEventListener("mouseup",up);
    window.addEventListener("touchmove",move,{passive:false});
    window.addEventListener("touchend",up);
    return ()=>{
      window.removeEventListener("mousemove",move);
      window.removeEventListener("mouseup",up);
      window.removeEventListener("touchmove",move);
      window.removeEventListener("touchend",up);
    };
  },[drag]);
 
  function startDrag(e, item, source){
    e.preventDefault();
    const ev = e.touches ? e.touches[0] : e;
    const rect = e.currentTarget.getBoundingClientRect();
    setDrag({
      id:item.id, level:item.level, source,
      x:ev.clientX, y:ev.clientY,
      offsetX: ev.clientX - rect.left,
      offsetY: ev.clientY - rect.top,
      size: rect.width
    });
  }
 
  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <Card style={{textAlign:"center",padding:"10px 16px"}}>
        <p style={{fontSize:13,color:"#888780",margin:0}}>Level <span style={{color:COLORS.purple.text,fontWeight:500}}>{xp.level}</span> · {xp.xp}/{XP_PER_LEVEL} XP to next</p>
        <p style={{fontSize:11,color:"#aaa8a2",margin:"4px 0 0"}}>Tap-hold an item to drag · drop on the room or the bag</p>
      </Card>
 
      {/* The room */}
      <div ref={roomRef} className="room-floor" style={{position:"relative",width:"100%",aspectRatio:"1/1",borderRadius:20,background:"linear-gradient(180deg, #FBF9F3 0%, #F1EFE8 60%, #E8E6DE 100%)",border:"0.5px solid #d3d1c7",overflow:"hidden",touchAction:"none"}}>
        {/* wall/floor divider */}
        <div style={{position:"absolute",left:0,right:0,top:"60%",height:1,background:"#d3d1c7",opacity:0.5}}/>
        {room.length===0 && <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",color:"#aaa8a2",fontSize:13,textAlign:"center",padding:20}}>Your room is empty.<br/>Open the bag and drag furniture in.</div>}
        {room.map(item=>(
          <div key={item.id}
               className="furn-item"
               onMouseDown={e=>startDrag(e,item,"room")}
               onTouchStart={e=>startDrag(e,item,"room")}
               style={{position:"absolute",left:`${item.x}%`,top:`${item.y}%`,cursor:"grab",opacity:drag&&drag.id===item.id?0.3:1,width:"15%",aspectRatio:"1/1",display:"flex",alignItems:"center",justifyContent:"center",zIndex:2}}>
            <div style={{width:"100%",height:"100%"}}><FurnSVG level={item.level} size="100%"/></div>
          </div>
        ))}
        {/* Bag icon: bottom-left of the room */}
        <button id="bag-icon" onClick={()=>setBagOpen(o=>!o)} style={{position:"absolute",left:12,bottom:12,width:46,height:46,borderRadius:"50%",background:bagOpen?COLORS.amber.bg:"#fff",border:`1.5px solid ${bagOpen?COLORS.amber.border:"#d3d1c7"}`,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 2px 6px rgba(0,0,0,0.1)",zIndex:5,padding:0}}>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={COLORS.amber.text} strokeWidth="1.6">
            <path d="M6 8h12l-1 12H7L6 8z"/>
            <path d="M9 8V6a3 3 0 0 1 6 0v2"/>
          </svg>
          {inv.length>0&&<span style={{position:"absolute",top:-4,right:-4,background:COLORS.coral.mid,color:"#fff",fontSize:10,borderRadius:20,minWidth:18,height:18,padding:"0 5px",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:500}}>{inv.length}</span>}
        </button>
      </div>
 
      {bagOpen && <Card>
        <p style={{fontSize:13,fontWeight:500,color:"#888780",margin:"0 0 12px"}}>Inventory · {inv.length} item{inv.length===1?"":"s"}</p>
        {inv.length===0 && <p style={{fontSize:13,color:"#aaa8a2",textAlign:"center",padding:"1rem 0"}}>Level up to unlock furniture</p>}
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(70px, 1fr))",gap:10}}>
          {inv.map(item=>{
            const meta = furnitureFor(item.level);
            return <div key={item.id}
                 className="furn-item"
                 onMouseDown={e=>startDrag(e,item,"inv")}
                 onTouchStart={e=>startDrag(e,item,"inv")}
                 style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,padding:8,borderRadius:14,background:COLORS[meta.palette].bg,border:`1px solid ${COLORS[meta.palette].border}`,cursor:"grab",opacity:drag&&drag.id===item.id?0.3:1}}>
              <FurnSVG level={item.level} size={42}/>
              <span style={{fontSize:9,color:COLORS[meta.palette].text,textAlign:"center",lineHeight:1.1}}>{meta.name}</span>
              <span style={{fontSize:9,color:"#888780"}}>Lv {item.level}</span>
            </div>;
          })}
        </div>
      </Card>}
 
      {/* Drag ghost */}
      {drag && <div style={{position:"fixed",left:drag.x-drag.offsetX,top:drag.y-drag.offsetY,width:drag.size,height:drag.size,pointerEvents:"none",zIndex:9999,opacity:0.9}}>
        <FurnSVG level={drag.level} size={drag.size}/>
      </div>}
    </div>
  );
}

function Progress({ xpApi }) {
  const { xp } = xpApi;
  // pull stats from storage
  const habits = load("pd_habits",[]);
  const entries = load("pd_time",[]);
  const hydrationSettings = load("pd_hydration",{portion:250,goal:2000,theme:"teal"});
  const hydrationLog = load("pd_hydration_log",[]);
  const td = today();
 
  function streak(c){ let s=0,d=new Date(); while(true){ const ds=d.toISOString().slice(0,10); if(c.includes(ds)){s++;d.setDate(d.getDate()-1);}else break; } return s; }
  const longestStreak = habits.reduce((a,h)=>Math.max(a,streak(h.completions)),0);
  const totalFocusSec = entries.reduce((a,e)=>a+e.secs,0);
  const totalFocusHours = (totalFocusSec/3600).toFixed(1);
  const waterToday = hydrationLog.filter(e=>e.date===td).reduce((a,e)=>a+e.ml,0);
  const xpPct = Math.round((xp.xp/XP_PER_LEVEL)*100);
 
  const stats = [
    { label:"Total focus", value:`${totalFocusHours}h`, sub:"all sessions", color:"teal" },
    { label:"Longest streak", value:`${longestStreak}`, sub:"days", color:"coral" },
    { label:"Water today", value:`${waterToday}`, sub:`of ${hydrationSettings.goal} ml`, color:"sky" },
    { label:"Level", value:`${xp.level}`, sub:`of ${MAX_LEVEL}`, color:"purple" },
  ];
 
  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:12}}>
        {stats.map(s=>{
          const c = COLORS[s.color];
          return <Card key={s.label} style={{display:"flex",flexDirection:"column",gap:4,background:c.bg,border:`1px solid ${c.border}`}}>
            <p style={{fontSize:12,color:c.text,margin:0,opacity:0.8}}>{s.label}</p>
            <p style={{fontSize:28,fontWeight:500,margin:0,color:c.text}}>{s.value}</p>
            <p style={{fontSize:11,color:c.text,margin:0,opacity:0.6}}>{s.sub}</p>
          </Card>;
        })}
      </div>
 
      <Card>
        <div style={{display:"flex",alignItems:"baseline",justifyContent:"space-between",marginBottom:8}}>
          <p style={{fontSize:13,fontWeight:500,color:"#888780",margin:0}}>XP to next level</p>
          <p style={{fontSize:13,color:COLORS.purple.text,margin:0,fontWeight:500}}>{xp.xp} / {XP_PER_LEVEL}</p>
        </div>
        <div className="bar-bg" style={{height:14,borderRadius:20,background:"#e8e6e0",overflow:"hidden"}}>
          <div style={{height:"100%",width:`${xpPct}%`,background:`linear-gradient(90deg, ${COLORS.purple.mid}, ${COLORS.pink.mid})`,borderRadius:20,transition:"width 0.4s"}}/>
        </div>
        <p style={{fontSize:11,color:"#aaa8a2",marginTop:8,textAlign:"center"}}>
          {xp.level>=MAX_LEVEL ? "Maximum level reached! ✨" : `${XP_PER_LEVEL-xp.xp} XP until level ${xp.level+1}`}
        </p>
      </Card>
 
      <Card>
        <p style={{fontSize:13,fontWeight:500,color:"#888780",margin:"0 0 6px"}}>How XP works</p>
        <p style={{fontSize:12,color:"#888780",lineHeight:1.5,margin:0}}>
          You earn {XP_PER_ACTION} XP for each habit checked, todo completed, focus session finished, and the daily water goal reached. Reach {XP_PER_LEVEL} XP to level up and unlock a new piece of furniture. Un-checking returns the XP — no spam.
        </p>
      </Card>
    </div>
  );
}

        <Tab label="My space" active={tab==="space"} onClick={()=>setTab("space")} />
        <Tab label="Progress" active={tab==="progress"} onClick={()=>setTab("progress")} />
      </div>
      {tab==="todos"&&<Todos xpApi={xpApi} awards={awards}/>}
      {tab==="time"&&<TimeTracker xpApi={xpApi} awards={awards}/>}
      {tab==="habits"&&<Habits xpApi={xpApi} awards={awards}/>}
      {tab==="hydration"&&<Hydration xpApi={xpApi} awards={awards}/>}
      {tab==="mood"&&<MoodLogger/>}
      {tab==="space"&&<MySpace xpApi={xpApi}/>}
      {tab==="progress"&&<Progress xpApi={xpApi}/>}
    </div>
  );
}
 
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
