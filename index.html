<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Dashboard</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f4f0; color: #1a1a18; min-height: 100vh; }
  input, select, button, textarea { font-family: inherit; }
  input[type=text], input[type=date], input[type=number], select, textarea {
    border-radius: 14px; border: 0.5px solid #d3d1c7; padding: 8px 14px;
    font-size: 14px; background: #f1efe8; color: #1a1a18; outline: none;
  }
  input[type=text]:focus, input[type=date]:focus, input[type=number]:focus, select:focus, textarea:focus { border-color: #888780; }
  input[type=checkbox] { accent-color: #7f77dd; }
  input[type=number] { -moz-appearance: textfield; }
  input[type=number]::-webkit-outer-spin-button, input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  @media (prefers-color-scheme: dark) {
    body { background: #1c1c1a; color: #f0ede8; }
    input[type=text], input[type=date], input[type=number], select, textarea { background: #2c2c2a; border-color: #444441; color: #f0ede8; }
    .card { background: #2c2c2a !important; border-color: #444441 !important; }
    .tab-bar { background: #2c2c2a !important; }
    .metric { background: #2c2c2a !important; }
    .bar-bg { background: #444441 !important; }
    .room-floor { background: #3a3a37 !important; }
  }
  .furn-item { user-select: none; -webkit-user-select: none; touch-action: none; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;
 
const COLORS = {
  purple: { bg: "#EEEDFE", border: "#AFA9EC", text: "#3C3489", mid: "#7F77DD" },
  teal:   { bg: "#E1F5EE", border: "#5DCAA5", text: "#085041", mid: "#1D9E75" },
  coral:  { bg: "#FAECE7", border: "#F0997B", text: "#712B13", mid: "#D85A30" },
  amber:  { bg: "#FAEEDA", border: "#EF9F27", text: "#633806", mid: "#BA7517" },
  green:  { bg: "#EAF3DE", border: "#97C459", text: "#27500A", mid: "#639922" },
  pink:   { bg: "#FCEAF1", border: "#EC9AB8", text: "#7A1F44", mid: "#D85A8C" },
  sky:    { bg: "#E3F0FB", border: "#8FBEE6", text: "#10406B", mid: "#3F8BC9" },
};
const CAT_OPTIONS = ["Work","Personal","Health","Learning","Other"];
const CAT_COLOR = { Work:"purple", Personal:"teal", Health:"coral", Learning:"amber", Other:"green" };
 
const URGENCY = [
  { key: "critical", label: "Critical", rank: 3, color: "coral" },
  { key: "high",     label: "High",     rank: 2, color: "amber" },
  { key: "medium",   label: "Medium",   rank: 1, color: "purple" },
  { key: "low",      label: "Low",      rank: 0, color: "green" },
];
const URGENCY_BY_KEY = Object.fromEntries(URGENCY.map(u=>[u.key,u]));
 
const MOODS = [
  { key: "veryBad", label: "Very bad", color: "coral",  face: "veryBad" },
  { key: "bad",     label: "Bad",      color: "amber",  face: "bad" },
  { key: "neutral", label: "Neutral",  color: "green",  face: "neutral" },
  { key: "good",    label: "Good",     color: "teal",   face: "good" },
  { key: "great",   label: "Excellent",color: "purple", face: "great" },
];
const MOOD_BY_KEY = Object.fromEntries(MOODS.map(m=>[m.key,m]));
 
// ---------- storage helpers ----------
function load(k,fb){ try{ const v=localStorage.getItem(k); return v?JSON.parse(v):fb; }catch{ return fb; } }
function save(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch{} }
function today(){ return new Date().toISOString().slice(0,10); }
function fmt(secs){ const h=Math.floor(secs/3600),m=Math.floor((secs%3600)/60),s=secs%60; if(h>0)return`${h}h ${m}m`; return`${m}m ${s}s`; }
function fmtClock(secs){ secs=Math.max(0,secs); const h=Math.floor(secs/3600),m=Math.floor((secs%3600)/60),s=secs%60; if(h>0)return`${h}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`; return`${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`; }
 
// ---------- XP system ----------
const XP_PER_LEVEL = 70;
const MAX_LEVEL = 100;
const XP_PER_ACTION = 5;
 
function useXP() {
  const [xp,setXp] = useState(()=>load("pd_xp",{total:0,level:1,inLevel:0,inventory:[],placed:{},awarded:[]}));
  useEffect(()=>save("pd_xp",xp),[xp]);
  const award = useCallback((key)=>{
    setXp(prev=>{
      if (prev.awarded.includes(key)) return prev;
      if (prev.level >= MAX_LEVEL) {
        return { ...prev, awarded:[...prev.awarded, key] };
      }
      let newTotal = prev.total + XP_PER_ACTION;
      let newLevel = prev.level;
      let newInLevel = prev.inLevel + XP_PER_ACTION;
      let newInventory = [...prev.inventory];
      while (newInLevel >= XP_PER_LEVEL && newLevel < MAX_LEVEL) {
        newInLevel -= XP_PER_LEVEL;
        newLevel += 1;
        // gain furniture #newLevel (1-indexed up to MAX_LEVEL)
        if (newLevel <= MAX_LEVEL) {
          newInventory.push({ id: `f${newLevel}_${Date.now()}_${Math.random().toString(36).slice(2,7)}`, furnId: newLevel });
        }
      }
      if (newLevel >= MAX_LEVEL) { newLevel = MAX_LEVEL; newInLevel = XP_PER_LEVEL; }
      return { ...prev, total:newTotal, level:newLevel, inLevel:newInLevel, inventory:newInventory, awarded:[...prev.awarded, key] };
    });
  },[]);
  const placeFurniture = useCallback((invId, x, y)=>{
    setXp(prev=>{
      const item = prev.inventory.find(i=>i.id===invId);
      if (!item) return prev;
      return {
        ...prev,
        inventory: prev.inventory.filter(i=>i.id!==invId),
        placed: { ...prev.placed, [invId]: { furnId: item.furnId, x, y } }
      };
    });
  },[]);
  const movePlaced = useCallback((id, x, y)=>{
    setXp(prev=>{
      if (!prev.placed[id]) return prev;
      return { ...prev, placed: { ...prev.placed, [id]: { ...prev.placed[id], x, y } } };
    });
  },[]);
  const returnToInventory = useCallback((id)=>{
    setXp(prev=>{
      const item = prev.placed[id];
      if (!item) return prev;
      const newPlaced = { ...prev.placed };
      delete newPlaced[id];
      return {
        ...prev,
        placed: newPlaced,
        inventory: [...prev.inventory, { id, furnId: item.furnId }]
      };
    });
  },[]);
  return { xp, award, placeFurniture, movePlaced, returnToInventory };
}

// ---------- Todos ----------
function Todos({ accent, setAccent, award }) {
  const [todos,setTodos]=useState(()=>load("pd_todos",[]));
  const [text,setText]=useState(""); const [due,setDue]=useState(""); const [cat,setCat]=useState("Work"); const [urg,setUrg]=useState("medium"); const [filter,setFilter]=useState("All");
  useEffect(()=>save("pd_todos",todos),[todos]);
  function add(){ if(!text.trim())return; setTodos(t=>[...t,{id:Date.now(),text:text.trim(),due,cat,urg,done:false}]); setText(""); setDue(""); }
  function toggle(id){
    setTodos(t=>t.map(x=>{
      if (x.id !== id) return x;
      const nowDone = !x.done;
      if (nowDone) award(`todo_${id}`);
      return { ...x, done: nowDone };
    }));
  }
  function remove(id){ setTodos(t=>t.filter(x=>x.id!==id)); }
  const td=today();
  const filtered=todos.filter(t=>filter==="All"?true:filter==="Active"?!t.done:t.done);
  // sort: not done first, then urgency rank desc, then due (closer first, empty due last), then id
  const sorted = [...filtered].sort((a,b)=>{
    if (a.done !== b.done) return a.done?1:-1;
    const ra = URGENCY_BY_KEY[a.urg||"medium"].rank, rb = URGENCY_BY_KEY[b.urg||"medium"].rank;
    if (ra !== rb) return rb - ra;
    const da = a.due || "9999-12-31", db = b.due || "9999-12-31";
    if (da !== db) return da < db ? -1 : 1;
    return a.id - b.id;
  });
  const overdue=todos.filter(t=>!t.done&&t.due&&t.due<td).length;
  const ac = COLORS[accent];
  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        <Inp placeholder="What needs to be done?" value={text} onChange={setText} style={{flex:1,minWidth:140}} />
        <input type="date" value={due} onChange={e=>setDue(e.target.value)} />
        <Sel value={cat} onChange={setCat} options={CAT_OPTIONS} />
        <Sel value={urg} onChange={setUrg} options={URGENCY.map(u=>({value:u.key,label:u.label}))} />
        <button onClick={add} style={{borderRadius:14,padding:"8px 20px",background:ac.mid,color:"#fff",border:"none",fontWeight:500,fontSize:14,cursor:"pointer"}}>Add</button>
      </div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
        {["All","Active","Done"].map(f=><Pill key={f} active={filter===f} onClick={()=>setFilter(f)} color={accent}>{f}</Pill>)}
        {overdue>0&&<span style={{marginLeft:"auto",fontSize:13,color:COLORS.coral.text,background:COLORS.coral.bg,borderRadius:20,padding:"3px 10px",border:`1px solid ${COLORS.coral.border}`}}>{overdue} overdue</span>}
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {sorted.length===0&&<p style={{color:"#888780",fontSize:14,textAlign:"center",padding:"1.5rem 0"}}>Nothing here yet</p>}
        {sorted.map(t=>{
          const ov=!t.done&&t.due&&t.due<td;
          const u = URGENCY_BY_KEY[t.urg||"medium"];
          const uc = COLORS[u.color];
          return <Card key={t.id} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",opacity:t.done?.6:1,borderLeft:`4px solid ${uc.mid}`}}>
            <input type="checkbox" checked={t.done} onChange={()=>toggle(t.id)} style={{width:18,height:18,flexShrink:0,cursor:"pointer"}} />
            <div style={{flex:1,minWidth:0}}>
              <span style={{fontSize:15,textDecoration:t.done?"line-through":"none"}}>{t.text}</span>
              {t.due&&<span style={{marginLeft:8,fontSize:12,color:ov?COLORS.coral.text:"#888780"}}>{t.due}</span>}
            </div>
            <UrgencyBadge urg={t.urg||"medium"}/>
            <Badge cat={t.cat} />
            <button onClick={()=>remove(t.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#888780",fontSize:18,lineHeight:1,padding:"2px 4px",borderRadius:8}}>×</button>
          </Card>;
        })}
      </div>
      <div style={{display:"flex",gap:12}}>
        {[{v:todos.filter(t=>!t.done).length,l:"remaining"},{v:todos.filter(t=>t.done).length,l:"completed"},{v:(todos.length?Math.round(todos.filter(t=>t.done).length/todos.length*100):0)+"%",l:"done"}].map(({v,l})=>
          <div key={l} className="metric" style={{flex:1,textAlign:"center",background:"#f1efe8",borderRadius:16,padding:"12px 8px"}}>
            <p style={{fontSize:22,fontWeight:500,margin:0}}>{v}</p>
            <p style={{fontSize:12,color:"#888780",margin:0}}>{l}</p>
          </div>)}
      </div>
    </div>
  );
}
 
// ---------- TimeTracker (now with count up/down) ----------
function TimeTracker({ accent, award }) {
  const [entries,setEntries]=useState(()=>load("pd_time",[]));
  const [activity,setActivity]=useState(""); const [cat,setCat]=useState("Work");
  const [mode,setMode]=useState(()=>load("pd_time_mode","up")); // "up" | "down"
  const [countdownMin,setCountdownMin]=useState(()=>load("pd_time_cd",25));
  const [running,setRunning]=useState(null);
  const [elapsed,setElapsed]=useState(0); // for count up: secs elapsed; for countdown: secs remaining
  const ref=useRef(null);
  useEffect(()=>save("pd_time",entries),[entries]);
  useEffect(()=>save("pd_time_mode",mode),[mode]);
  useEffect(()=>save("pd_time_cd",countdownMin),[countdownMin]);
 
  useEffect(()=>{
    if(!running){ clearInterval(ref.current); return; }
    ref.current = setInterval(()=>{
      if (running.mode === "up") {
        setElapsed(Math.floor((Date.now()-running.startMs)/1000));
      } else {
        const elapsedSecs = Math.floor((Date.now()-running.startMs)/1000);
        const remaining = running.targetSecs - elapsedSecs;
        if (remaining <= 0) {
          // session complete
          const completedSecs = running.targetSecs;
          setEntries(e=>[...e,{id:Date.now(),activity:running.activity,cat:running.cat,secs:completedSecs,date:today(),mode:"down"}]);
          award(`session_${Date.now()}`);
          setRunning(null);
          setElapsed(0);
          try { new AudioContext(); } catch {}
        } else {
          setElapsed(remaining);
        }
      }
    }, 250);
    return ()=>clearInterval(ref.current);
  },[running, award]);
 
  function startStop(){
    if(running){
      if (running.mode === "up") {
        const s = Math.round((Date.now()-running.startMs)/1000);
        if (s>0) {
          setEntries(e=>[...e,{id:Date.now(),activity:running.activity,cat:running.cat,secs:s,date:today(),mode:"up"}]);
          award(`session_${Date.now()}`);
        }
      } else {
        // stopped early — log partial
        const elapsedSecs = Math.round((Date.now()-running.startMs)/1000);
        if (elapsedSecs>0) {
          setEntries(e=>[...e,{id:Date.now(),activity:running.activity,cat:running.cat,secs:elapsedSecs,date:today(),mode:"down-cancelled"}]);
        }
      }
      setRunning(null); setElapsed(0);
    } else {
      if(!activity.trim()) return;
      if (mode === "up") {
        setRunning({mode:"up",activity:activity.trim(),cat,startMs:Date.now()});
        setElapsed(0);
      } else {
        const targetSecs = Math.max(1, parseInt(countdownMin)||25) * 60;
        setRunning({mode:"down",activity:activity.trim(),cat,startMs:Date.now(),targetSecs});
        setElapsed(targetSecs);
      }
    }
  }
  function remove(id){ setEntries(e=>e.filter(x=>x.id!==id)); }
  const td=today(); const todayE=entries.filter(e=>e.date===td);
  const todayS=todayE.reduce((a,e)=>a+e.secs,0); const totalS=entries.reduce((a,e)=>a+e.secs,0);
  const byCat=CAT_OPTIONS.map(c=>({cat:c,secs:entries.filter(e=>e.cat===c).reduce((a,e)=>a+e.secs,0)})).filter(x=>x.secs>0);
  const ac = COLORS[accent];
 
  // ring progress for countdown
  let progress = 0;
  if (running && running.mode === "down") {
    progress = 1 - (elapsed / running.targetSecs);
  } else if (running && running.mode === "up") {
    progress = (elapsed % 60) / 60;
  }
  const r=70, circ = 2*Math.PI*r;
 
  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <Card style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
        <Inp placeholder="Activity name" value={activity} onChange={setActivity} style={{flex:1,minWidth:140}} />
        <Sel value={cat} onChange={setCat} options={CAT_OPTIONS} />
        <button onClick={startStop} style={{borderRadius:14,padding:"8px 22px",background:running?COLORS.coral.mid:ac.mid,color:"#fff",border:"none",fontWeight:500,fontSize:14,cursor:"pointer",minWidth:80}}>{running?"Stop":"Start"}</button>
      </Card>
 
      <Card style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
        <span style={{fontSize:13,color:"#888780",fontWeight:500}}>Mode</span>
        <div style={{display:"flex",gap:6}}>
          <Pill active={mode==="up"} onClick={()=>!running&&setMode("up")} color={accent}>Count up</Pill>
          <Pill active={mode==="down"} onClick={()=>!running&&setMode("down")} color={accent}>Count down</Pill>
        </div>
        {mode==="down"&&<div style={{display:"flex",alignItems:"center",gap:8,marginLeft:"auto"}}>
          <span style={{fontSize:13,color:"#888780"}}>Duration</span>
          <input type="number" value={countdownMin} min={1} max={240} onChange={e=>!running&&setCountdownMin(Math.max(1,parseInt(e.target.value)||25))} style={{width:64}} disabled={!!running}/>
          <span style={{fontSize:13,color:"#888780"}}>min</span>
        </div>}
      </Card>
 
      {running&&<Card style={{textAlign:"center",background:ac.bg,border:`1px solid ${ac.border}`,padding:"20px 16px"}}>
        <p style={{fontSize:13,color:ac.text,margin:"0 0 8px"}}>{running.mode==="down"?"Counting down":"Tracking"}: {running.activity}</p>
        <div style={{position:"relative",width:170,height:170,margin:"0 auto"}}>
          <svg width="170" height="170" viewBox="0 0 170 170">
            <circle cx="85" cy="85" r={r} fill="none" stroke={ac.border} strokeWidth="6" opacity="0.3"/>
            <circle cx="85" cy="85" r={r} fill="none" stroke={ac.mid} strokeWidth="6" strokeLinecap="round"
              strokeDasharray={circ} strokeDashoffset={circ*(1-Math.max(0,Math.min(1,progress)))}
              transform="rotate(-90 85 85)"/>
          </svg>
          <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
            <span style={{fontSize:30,fontWeight:500,color:ac.text}}>{fmtClock(elapsed)}</span>
          </div>
        </div>
      </Card>}
 
      <div style={{display:"flex",gap:12}}>
        {[{v:fmt(todayS),l:"today"},{v:fmt(totalS),l:"total"},{v:todayE.length,l:"sessions today"}].map(({v,l})=>
          <div key={l} className="metric" style={{flex:1,textAlign:"center",background:"#f1efe8",borderRadius:16,padding:"12px 8px"}}>
            <p style={{fontSize:22,fontWeight:500,margin:0}}>{v}</p>
            <p style={{fontSize:12,color:"#888780",margin:0}}>{l}</p>
          </div>)}
      </div>
      {byCat.length>0&&<Card>
        <p style={{fontSize:13,fontWeight:500,margin:"0 0 10px",color:"#888780"}}>Time by category</p>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {byCat.map(({cat:c,secs})=>{ const pct=totalS?Math.round(secs/totalS*100):0; const col=COLORS[CAT_COLOR[c]||"green"]; return(
            <div key={c}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:3}}><span>{c}</span><span style={{color:"#888780"}}>{fmt(secs)} · {pct}%</span></div>
              <div className="bar-bg" style={{height:8,borderRadius:20,background:"#e8e6e0",overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:col.mid,borderRadius:20}}/></div>
            </div>);})}
        </div>
      </Card>}
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        <p style={{fontSize:13,fontWeight:500,color:"#888780"}}>Log</p>
        {entries.length===0&&<p style={{color:"#888780",fontSize:14,textAlign:"center",padding:"1.5rem 0"}}>No sessions logged yet</p>}

// ---------- Habits ----------
function Habits({ accent, award }) {
  const [habits,setHabits]=useState(()=>load("pd_habits",[]));
  const [name,setName]=useState(""); const [cat,setCat]=useState("Health");
  const td=today();
  useEffect(()=>save("pd_habits",habits),[habits]);
  function add(){ if(!name.trim())return; setHabits(h=>[...h,{id:Date.now(),name:name.trim(),cat,completions:[]}]); setName(""); }
  function toggle(id){
    setHabits(h=>h.map(x=>{
      if(x.id!==id) return x;
      const d=x.completions.includes(td);
      if (!d) award(`habit_${id}_${td}`);
      return{...x,completions:d?x.completions.filter(c=>c!==td):[...x.completions,td]};
    }));
  }
  function remove(id){ setHabits(h=>h.filter(x=>x.id!==id)); }
  function streak(c){ let s=0,d=new Date(); while(true){ const ds=d.toISOString().slice(0,10); if(c.includes(ds)){s++;d.setDate(d.getDate()-1);}else break; } return s; }
  const last7=Array.from({length:7},(_,i)=>{ const d=new Date(); d.setDate(d.getDate()-(6-i)); return d.toISOString().slice(0,10); });
  const doneToday=habits.filter(h=>h.completions.includes(td)).length;
  const ac=COLORS[accent];
  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        <Inp placeholder="New habit" value={name} onChange={setName} style={{flex:1,minWidth:160}} />
        <Sel value={cat} onChange={setCat} options={CAT_OPTIONS} />
        <button onClick={add} style={{borderRadius:14,padding:"8px 20px",background:ac.mid,color:"#fff",border:"none",fontWeight:500,fontSize:14,cursor:"pointer"}}>Add</button>
      </div>
      <div style={{display:"flex",gap:12}}>
        {[{v:`${doneToday}/${habits.length}`,l:"done today"},{v:`${habits.length?Math.round(doneToday/habits.length*100):0}%`,l:"completion rate"},{v:habits.reduce((a,h)=>Math.max(a,streak(h.completions)),0),l:"best streak"}].map(({v,l})=>
          <div key={l} className="metric" style={{flex:1,textAlign:"center",background:"#f1efe8",borderRadius:16,padding:"12px 8px"}}>
            <p style={{fontSize:22,fontWeight:500,margin:0}}>{v}</p>
            <p style={{fontSize:12,color:"#888780",margin:0}}>{l}</p>
          </div>)}
      </div>
      {habits.length===0&&<p style={{color:"#888780",fontSize:14,textAlign:"center",padding:"1.5rem 0"}}>Add your first habit above</p>}
      {habits.map(h=>{
        const done=h.completions.includes(td); const s=streak(h.completions); const col=COLORS[CAT_COLOR[h.cat]||"green"];
        return <Card key={h.id}>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
            <button onClick={()=>toggle(h.id)} style={{width:28,height:28,borderRadius:50,border:`2px solid ${done?col.mid:"#d3d1c7"}`,background:done?col.mid:"transparent",cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:16}}>{done?"✓":""}</button>
            <span style={{flex:1,fontSize:15}}>{h.name}</span>
            <Badge cat={h.cat} />
            {s>0&&<span style={{fontSize:13,color:COLORS.amber.text,background:COLORS.amber.bg,borderRadius:20,padding:"2px 10px",border:`1px solid ${COLORS.amber.border}`}}>{s} day streak</span>}
            <button onClick={()=>remove(h.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#888780",fontSize:18,lineHeight:1,padding:"2px 4px",borderRadius:8}}>×</button>
          </div>
          <div style={{display:"flex",gap:5}}>
            {last7.map(d=>{ const f=h.completions.includes(d); const it=d===td; return <div key={d} style={{flex:1,height:10,borderRadius:10,background:f?col.mid:"#e8e6e0",border:it?`1.5px solid ${col.border}`:"none"}}/>; })}

      })}

  );

// ---------- Hydration ----------
function Hydration({ accent, award }) {
  const [settings,setSettings]=useState(()=>load("pd_hydration",{portion:250,goal:2000}));
  const [log,setLog]=useState(()=>load("pd_hydration_log",[]));
  const td=today();
  useEffect(()=>save("pd_hydration",settings),[settings]);
  useEffect(()=>save("pd_hydration_log",log),[log]);
  const todayE=log.filter(e=>e.date===td);
  const todayMl=todayE.reduce((a,e)=>a+e.ml,0);
  const pct=Math.min(100,Math.round(todayMl/settings.goal*100));
  const col=COLORS[accent];
  // award xp when goal reached today (once per day)
  useEffect(()=>{
    if (todayMl >= settings.goal) award(`water_${td}`);
  },[todayMl, settings.goal, td, award]);
  function addWater(){setLog(l=>[...l,{id:Date.now(),ml:settings.portion,date:td}]);}
  function removeWater(){if(!todayE.length)return;const last=todayE[todayE.length-1];setLog(l=>l.filter(e=>e.id!==last.id));}
  const cx=100,cy=100,r=85;
  const fillH=Math.round(r*2*pct/100);
  const fillY=(cy+r)-fillH;
  const textOnWater=pct>=52;
  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <Card>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <p style={{fontSize:13,fontWeight:500,color:"#888780",margin:0}}>Hydration settings</p>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:14,flex:1}}>Portion size</span>
            <Sel value={String(settings.portion)} onChange={v=>setSettings(s=>({...s,portion:parseInt(v)}))} options={["125","250","500"]} />
            <span style={{fontSize:13,color:"#888780"}}>ml</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:14,flex:1}}>Daily goal</span>
            <input type="number" value={settings.goal} min={250} max={10000} step={250} onChange={e=>setSettings(s=>({...s,goal:Math.max(250,parseInt(e.target.value)||2000)}))} style={{width:80}} />
            <span style={{fontSize:13,color:"#888780"}}>ml</span>
          </div>
        </div>
      </Card>
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:20,padding:"0.5rem 0"}}>
        <div style={{position:"relative",width:200,height:200}}>
          <svg width="200" height="200" viewBox="0 0 200 200">
            <defs><clipPath id="hydrationClip"><circle cx={cx} cy={cy} r={r}/></clipPath></defs>
            <circle cx={cx} cy={cy} r={r} fill={col.bg}/>
            {pct>0&&<path
              d={pct>=99
                ?`M ${cx-r} ${fillY} L ${cx+r} ${fillY} L ${cx+r} ${cy+r+2} L ${cx-r} ${cy+r+2} Z`
                :`M ${cx-r} ${fillY} Q ${cx-r/2} ${fillY-8} ${cx} ${fillY} Q ${cx+r/2} ${fillY+8} ${cx+r} ${fillY} L ${cx+r} ${cy+r+2} L ${cx-r} ${cy+r+2} Z`
              }
              fill={col.mid} opacity="0.55" clipPath="url(#hydrationClip)"
            />}
            <circle cx={cx} cy={cy} r={r} fill="none" stroke={col.border} strokeWidth="2.5"/>
          </svg>
          <div style={{position:"absolute",top:0,left:0,width:"100%",height:"100%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",pointerEvents:"none"}}>
            <span style={{fontSize:30,fontWeight:500,color:textOnWater?"#fff":col.text,lineHeight:1}}>{todayMl}</span>
            <span style={{fontSize:12,color:textOnWater?"rgba(255,255,255,0.8)":"#888780",marginTop:2}}>of {settings.goal} ml</span>
            {pct>=100&&<span style={{fontSize:11,marginTop:4,color:"#fff",fontWeight:500}}>Goal reached!</span>}
          </div>
        </div>
        <span style={{fontSize:13,color:col.text,background:col.bg,borderRadius:20,padding:"4px 14px",border:`1px solid ${col.border}`}}>{pct}% of daily goal</span>
        <div style={{display:"flex",alignItems:"center",gap:24}}>
          <button onClick={removeWater} disabled={!todayE.length} style={{width:52,height:52,borderRadius:"50%",background:"transparent",border:"1.5px solid #d3d1c7",color:"#888780",fontSize:26,cursor:todayE.length?"pointer":"default",display:"flex",alignItems:"center",justifyContent:"center",opacity:todayE.length?1:0.4}}>−</button>
          <div style={{textAlign:"center",minWidth:70}}>
            <p style={{fontSize:13,color:"#888780",margin:0}}>{settings.portion} ml</p>
            <p style={{fontSize:11,color:"#aaa8a2",margin:0}}>per tap</p>
          </div>
          <button onClick={addWater} style={{width:52,height:52,borderRadius:"50%",background:col.mid,border:"none",color:"#fff",fontSize:26,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
        </div>
      </div>
      <div style={{display:"flex",gap:12}}>
        {[{v:todayMl,l:"ml today"},{v:settings.goal,l:"ml goal"},{v:todayE.length,l:"portions"}].map(({v,l})=>

    </div>
  );

// ---------- Mood Logger ----------
function MoodLogger({ accent, award }) {
  const [logs,setLogs]=useState(()=>load("pd_mood",{}));
  const [note,setNote]=useState("");
  const [viewMonth,setViewMonth]=useState(()=>{ const d=new Date(); return {y:d.getFullYear(),m:d.getMonth()}; });
  useEffect(()=>save("pd_mood",logs),[logs]);
  const td = today();
  const todayMood = logs[td]?.mood;
  function logMood(k) {
    setLogs(prev=>({ ...prev, [td]: { mood: k, note: prev[td]?.note || "" } }));
  }
  function saveNote() {
    if (!todayMood) return;
    setLogs(prev=>({ ...prev, [td]: { ...prev[td], note } }));
    setNote("");
  }
  function prevMonth(){ setViewMonth(v=>{ const m=v.m-1; return m<0?{y:v.y-1,m:11}:{...v,m}; }); }
  function nextMonth(){ setViewMonth(v=>{ const m=v.m+1; return m>11?{y:v.y+1,m:0}:{...v,m}; }); }
 
  const {y,m} = viewMonth;
  const monthName = new Date(y,m,1).toLocaleString(undefined,{month:"long",year:"numeric"});
  const firstDay = new Date(y,m,1).getDay(); // 0=Sun
  const daysInMonth = new Date(y,m+1,0).getDate();
  const cells = [];
  for (let i=0;i<firstDay;i++) cells.push(null);
  for (let d=1;d<=daysInMonth;d++) {
    const ds = `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    cells.push({ day:d, ds, entry: logs[ds] });
  }
  const ac = COLORS[accent];
 
  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <Card>
        <p style={{fontSize:13,fontWeight:500,color:"#888780",margin:"0 0 14px"}}>How are you feeling today?</p>
        <div style={{display:"flex",justifyContent:"space-between",gap:8,flexWrap:"wrap"}}>
          {MOODS.map(mo=>{
            const c = COLORS[mo.color];
            const selected = todayMood === mo.key;
            return (
              <button key={mo.key} onClick={()=>logMood(mo.key)} style={{flex:1,minWidth:60,background:selected?c.bg:"transparent",border:selected?`1.5px solid ${c.border}`:"1.5px solid transparent",borderRadius:16,padding:"10px 6px 8px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:4,transition:"all 0.15s"}}>
                <MoodFace kind={mo.face} color={c.mid} size={44}/>
                <span style={{fontSize:11,color:selected?c.text:"#888780",fontWeight:selected?500:400}}>{mo.label}</span>
              </button>
            );
          })}
        </div>
        {todayMood&&<div style={{marginTop:14,display:"flex",gap:8}}>
          <Inp placeholder="Optional note for today…" value={note} onChange={setNote} style={{flex:1}}/>
          <button onClick={saveNote} style={{borderRadius:14,padding:"8px 18px",background:ac.mid,color:"#fff",border:"none",fontWeight:500,fontSize:13,cursor:"pointer"}}>Save</button>
        </div>}
        {todayMood&&logs[td]?.note&&<p style={{fontSize:13,color:"#888780",marginTop:10,fontStyle:"italic"}}>"{logs[td].note}"</p>}
      </Card>
 
      <Card>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
          <button onClick={prevMonth} style={{background:"transparent",border:"none",cursor:"pointer",color:"#888780",fontSize:20,padding:"2px 8px"}}>‹</button>
          <p style={{fontSize:14,fontWeight:500,margin:0}}>{monthName}</p>
          <button onClick={nextMonth} style={{background:"transparent",border:"none",cursor:"pointer",color:"#888780",fontSize:20,padding:"2px 8px"}}>›</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:4}}>
          {["S","M","T","W","T","F","S"].map((d,i)=><span key={i} style={{fontSize:10,color:"#888780",textAlign:"center",padding:"2px 0"}}>{d}</span>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
          {cells.map((cell,i)=>{
            if (!cell) return <div key={i} style={{aspectRatio:"1/1"}}/>;
            const mo = cell.entry ? MOOD_BY_KEY[cell.entry.mood] : null;
            const isToday = cell.ds === td;
            return (
              <div key={i} style={{aspectRatio:"1/1",borderRadius:10,background: mo?COLORS[mo.color].bg:"#f1efe8",border: isToday?`1.5px solid ${ac.border}`:"0.5px solid transparent",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",position:"relative",overflow:"hidden"}}>
                <span style={{fontSize:9,color: mo?COLORS[mo.color].text:"#888780",position:"absolute",top:3,left:4}}>{cell.day}</span>
                {mo && <MoodFace kind={mo.face} color={COLORS[mo.color].mid} size={26}/>}
              </div>
            );
          })}
        </div>
      </Card>
 
      <div style={{display:"flex",gap:12}}>
        {(()=>{
          const total = Object.keys(logs).length;
          // current streak ending today
          let streak = 0;
          const d = new Date();
          while (true) {
            const ds = d.toISOString().slice(0,10);
            if (logs[ds]) { streak++; d.setDate(d.getDate()-1); } else break;
          }
          const moodCounts = MOODS.map(m=>({key:m.key,n:Object.values(logs).filter(l=>l.mood===m.key).length}));
          const top = moodCounts.sort((a,b)=>b.n-a.n)[0];
          const topLabel = top && top.n>0 ? MOOD_BY_KEY[top.key].label : "—";
          return [
            {v:total,l:"days logged"},
            {v:streak,l:"current streak"},
            {v:topLabel,l:"most often"},
          ];
        })().map(({v,l})=>
          <div key={l} className="metric" style={{flex:1,textAlign:"center",background:"#f1efe8",borderRadius:16,padding:"12px 8px"}}>
            <p style={{fontSize:18,fontWeight:500,margin:0}}>{v}</p>
            <p style={{fontSize:12,color:"#888780",margin:0}}>{l}</p>
          </div>)}
      </div>
    </div>
  );
}
 
// ---------- Progress ----------
function Progress({ accent, xp }) {
  const entries = load("pd_time",[]);
  const habits = load("pd_habits",[]);
  const hydroLog = load("pd_hydration_log",[]);
  const td = today();
  const totalSecs = entries.reduce((a,e)=>a+e.secs,0);
  const totalHours = (totalSecs/3600);
  function streak(c){ let s=0,d=new Date(); while(true){ const ds=d.toISOString().slice(0,10); if(c.includes(ds)){s++;d.setDate(d.getDate()-1);}else break; } return s; }
  // longest historical streak across any habit
  function longestStreak(completions) {
    if (!completions.length) return 0;
    const sorted = [...completions].sort();
    let best = 1, cur = 1;
    for (let i=1;i<sorted.length;i++) {
      const prev = new Date(sorted[i-1]);
      const curD = new Date(sorted[i]);
      const diff = Math.round((curD-prev)/(1000*60*60*24));
      if (diff === 1) { cur++; best = Math.max(best,cur); } else { cur = 1; }
    }
    return best;
  }
  const longestHabitStreak = habits.reduce((a,h)=>Math.max(a,longestStreak(h.completions)),0);
  const todayWater = hydroLog.filter(e=>e.date===td).reduce((a,e)=>a+e.ml,0);
  const ac = COLORS[accent];
  const pct = xp.level >= MAX_LEVEL ? 100 : Math.round((xp.inLevel/XP_PER_LEVEL)*100);
 
  const stats = [
    { v: totalHours.toFixed(1), suffix:"h", l: "total focus time", c: "purple", icon:"⏱" },
    { v: longestHabitStreak, suffix:" days", l: "longest habit streak", c: "amber", icon:"🔥" },
    { v: todayWater, suffix:" ml", l: "water today", c: "teal", icon:"💧" },

            <p style={{fontSize:32,fontWeight:500,color:ac.text,margin:0,lineHeight:1.1}}>Level {xp.level}</p>
          </div>
          <div style={{textAlign:"right"}}>
            <p style={{fontSize:11,color:ac.text,margin:0,opacity:0.7}}>Total XP</p>
            <p style={{fontSize:18,fontWeight:500,color:ac.text,margin:0}}>{xp.total}</p>
          </div>
        </div>
        <div className="bar-bg" style={{height:12,borderRadius:20,background:"#e8e6e0",overflow:"hidden",border:`1px solid ${ac.border}`}}>
          <div style={{height:"100%",width:`${pct}%`,background:ac.mid,borderRadius:20,transition:"width 0.4s"}}/>
        </div>
        <p style={{fontSize:12,color:ac.text,marginTop:6,textAlign:"center"}}>
          {xp.level>=MAX_LEVEL ? "Max level reached!" : `${XP_PER_LEVEL - xp.inLevel} XP until level ${xp.level+1}`}
        </p>
      </Card>
 
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        {stats.map(s=>{
          const c = COLORS[s.c];
          return (
            <Card key={s.l} style={{padding:"14px 16px"}}>
              <p style={{fontSize:12,color:"#888780",margin:"0 0 4px"}}>{s.l}</p>
              <div style={{display:"flex",alignItems:"baseline",gap:4}}>
                <span style={{fontSize:24,fontWeight:500,color:c.text}}>{s.v}</span>

            </Card>
          );
        })}
      </div>
 
      <Card>
        <p style={{fontSize:13,fontWeight:500,color:"#888780",margin:"0 0 10px"}}>How to earn XP</p>

      </Card>
 
      <Card>
        <p style={{fontSize:13,fontWeight:500,color:"#888780",margin:"0 0 10px"}}>Inventory</p>
        <p style={{fontSize:13,color:"#888780"}}>{xp.inventory.length} item{xp.inventory.length===1?"":"s"} unplaced · {Object.keys(xp.placed).length} placed in room</p>
      </Card>
    </div>
  );
}
 
// ---------- My Space (Room) ----------
function MySpace({ accent, onClose, xp, placeFurniture, movePlaced, returnToInventory }) {
  const [bagOpen, setBagOpen] = useState(false);
  const roomRef = useRef(null);
  const [drag, setDrag] = useState(null); // { source: 'placed'|'inventory', id, furnId, offsetX, offsetY, x, y, overBag }
  const [bagRect, setBagRect] = useState(null);
  const bagBtnRef = useRef(null);
 
  const ac = COLORS[accent];
 
  function startDragPlaced(e, id, furnId) {
    e.preventDefault();
    const rect = roomRef.current.getBoundingClientRect();
    const placed = xp.placed[id];
    const pt = e.touches ? e.touches[0] : e;
    setDrag({
      source: "placed", id, furnId,
      offsetX: pt.clientX - (rect.left + placed.x),
      offsetY: pt.clientY - (rect.top + placed.y),
      x: pt.clientX, y: pt.clientY, overBag: false,
    });
  }
  function startDragInventory(e, invItem) {
    e.preventDefault();
    const pt = e.touches ? e.touches[0] : e;
    setDrag({
      source: "inventory", id: invItem.id, furnId: invItem.furnId,
      offsetX: 30, offsetY: 30,
      x: pt.clientX, y: pt.clientY, overBag: false,
    });
    setBagOpen(false);
  }
 
  useEffect(()=>{
    if (!drag) return;
    function updateBagRect() {
      if (bagBtnRef.current) setBagRect(bagBtnRef.current.getBoundingClientRect());
    }
    updateBagRect();
    function onMove(e) {
      const pt = e.touches ? e.touches[0] : e;
      const br = bagBtnRef.current?.getBoundingClientRect();
      let overBag = false;
      if (br) {
        const cx = br.left + br.width/2, cy = br.top + br.height/2;
        const dx = pt.clientX - cx, dy = pt.clientY - cy;
        if (Math.sqrt(dx*dx + dy*dy) < 36) overBag = true;
      }
      setDrag(d => d ? { ...d, x: pt.clientX, y: pt.clientY, overBag } : d);
      if (e.touches) e.preventDefault();
    }
    function onUp(e) {
      setDrag(curDrag => {
        if (!curDrag) return null;
        const rect = roomRef.current?.getBoundingClientRect();
        const pt = (e.changedTouches && e.changedTouches[0]) ? e.changedTouches[0] : e;
        if (curDrag.overBag) {
          if (curDrag.source === "placed") returnToInventory(curDrag.id);
          // if from inventory and dropped on bag, do nothing (stays in inventory)
        } else if (rect && pt.clientX >= rect.left && pt.clientX <= rect.right && pt.clientY >= rect.top && pt.clientY <= rect.bottom) {
          const x = pt.clientX - rect.left - curDrag.offsetX;
          const y = pt.clientY - rect.top - curDrag.offsetY;
          const clampedX = Math.max(0, Math.min(rect.width - 60, x));
          const clampedY = Math.max(0, Math.min(rect.height - 60, y));
          if (curDrag.source === "inventory") {
            placeFurniture(curDrag.id, clampedX, clampedY);
          } else {
            movePlaced(curDrag.id, clampedX, clampedY);
          }
        }
        return null;
      });
    }
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onUp);
    window.addEventListener("touchmove", onMove, { passive: false });
    window.addEventListener("touchend", onUp);
    return ()=>{
      window.removeEventListener("mousemove", onMove);
      window.removeEventListener("mouseup", onUp);
      window.removeEventListener("touchmove", onMove);
      window.removeEventListener("touchend", onUp);
    };
  },[drag, placeFurniture, movePlaced, returnToInventory]);
 
  const placedEntries = Object.entries(xp.placed);
  const pct = xp.level >= MAX_LEVEL ? 100 : Math.round((xp.inLevel/XP_PER_LEVEL)*100);
 
  return (
    <div style={{position:"fixed",inset:0,background:"#f5f4f0",zIndex:100,display:"flex",flexDirection:"column"}}>
      <div style={{padding:"16px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,borderBottom:"0.5px solid #d3d1c7"}}>
        <div>
          <p style={{fontSize:11,color:"#888780",margin:0}}>My space</p>
          <p style={{fontSize:16,fontWeight:500,margin:0}}>Level {xp.level} · {xp.inventory.length + placedEntries.length}/{MAX_LEVEL} items</p>
        </div>
        <div style={{flex:1,maxWidth:200}}>
          <div className="bar-bg" style={{height:8,borderRadius:20,background:"#e8e6e0",overflow:"hidden"}}>
            <div style={{height:"100%",width:`${pct}%`,background:ac.mid,borderRadius:20,transition:"width 0.4s"}}/>
          </div>
          <p style={{fontSize:10,color:"#888780",margin:"4px 0 0",textAlign:"center"}}>{xp.level>=MAX_LEVEL?"Max":`${XP_PER_LEVEL-xp.inLevel} XP to level ${xp.level+1}`}</p>
        </div>
        <button onClick={onClose} style={{background:"transparent",border:"1px solid #d3d1c7",borderRadius:"50%",width:34,height:34,cursor:"pointer",fontSize:18,color:"#888780",display:"flex",alignItems:"center",justifyContent:"center",padding:0}}>×</button>
      </div>
 
      <div style={{flex:1,padding:"20px",overflow:"hidden",display:"flex",flexDirection:"column"}}>
        <div ref={roomRef} className="room-floor" style={{
          flex:1,
          background:"linear-gradient(180deg, #f0e9d8 0%, #e3d7b8 100%)",
          borderRadius:24,
          border:"0.5px solid #d3d1c7",
          position:"relative",
          overflow:"hidden",
          boxShadow:"inset 0 6px 12px rgba(0,0,0,0.04)",
        }}>
          {/* back wall decoration: stripes */}
          <div style={{position:"absolute",top:0,left:0,right:0,height:"32%",background:"linear-gradient(180deg, #fef8e8 0%, #f5ead0 100%)",borderBottom:"1px solid rgba(120,100,60,0.15)"}}/>
 
          {placedEntries.length === 0 && xp.inventory.length === 0 && (
            <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:8,color:"#888780",fontSize:14,textAlign:"center",padding:"0 24px"}}>
              <p>Your room is empty.</p>
              <p style={{fontSize:12}}>Earn XP by finishing sessions, checking habits, drinking water, or completing to-dos. Each level rewards a piece of furniture.</p>
            </div>
          )}
          {placedEntries.length === 0 && xp.inventory.length > 0 && (
            <div style={{position:"absolute",top:"40%",left:0,right:0,textAlign:"center",color:"#888780",fontSize:13,padding:"0 24px"}}>
              <p>Open your bag and drag items into the room.</p>
            </div>
          )}
 
          {placedEntries.map(([id, p])=>{
            if (drag && drag.source==="placed" && drag.id===id) return null; // hidden during drag (rendered as overlay)
            return (
              <div key={id}
                className="furn-item"
                onMouseDown={(e)=>startDragPlaced(e,id,p.furnId)}
                onTouchStart={(e)=>startDragPlaced(e,id,p.furnId)}
                style={{
                  position:"absolute",
                  left:p.x, top:p.y,
                  width:60, height:60,
                  cursor:"grab",
                }}
                title={FURNITURE[p.furnId-1]?.name || ""}
              >
                <Furniture furnId={p.furnId}/>
              </div>
            );
          })}
        </div>
 
        {/* drag overlay */}
        {drag && (
          <div style={{
            position:"fixed",
            left: drag.x - drag.offsetX,
            top: drag.y - drag.offsetY,
            width:60, height:60,
            pointerEvents:"none",
            zIndex:200,
            opacity: drag.overBag ? 0.4 : 0.9,
            filter: drag.overBag ? "grayscale(0.5)" : "drop-shadow(0 6px 12px rgba(0,0,0,0.2))",
          }}>
            <Furniture furnId={drag.furnId}/>
          </div>
        )}
      </div>
 
      {/* backpack button */}
      <button ref={bagBtnRef} onClick={()=>!drag && setBagOpen(o=>!o)} style={{
        position:"fixed",
        bottom:20, left:20,
        width:56, height:56, borderRadius:"50%",
        background: drag?.overBag ? COLORS.coral.mid : (bagOpen?ac.mid:"#fff"),
        border: `1.5px solid ${drag?.overBag?COLORS.coral.border:(bagOpen?ac.border:"#d3d1c7")}`,
        boxShadow:"0 4px 14px rgba(0,0,0,0.1)",
        cursor:"pointer",
        display:"flex",alignItems:"center",justifyContent:"center",
        padding:0,
        zIndex:150,
        transition:"all 0.15s",
      }} aria-label="Inventory">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke={drag?.overBag||bagOpen?"#fff":"#888780"} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
          <path d="M4 10 Q4 6, 8 6 L8 5 Q8 3, 12 3 Q16 3, 16 5 L16 6 Q20 6, 20 10 L20 19 Q20 21, 18 21 L6 21 Q4 21, 4 19 Z"/>
          <path d="M9 6 L9 4 Q9 3, 12 3 Q15 3, 15 4 L15 6"/>
          <line x1="4" y1="12" x2="20" y2="12"/>
        </svg>
        {xp.inventory.length>0 && !bagOpen && (
          <span style={{
            position:"absolute",
            top:-2, right:-2,
            background:ac.mid,
            color:"#fff",
            borderRadius:"50%",
            width:20, height:20,
            fontSize:11, fontWeight:600,
            display:"flex",alignItems:"center",justifyContent:"center",
            border:"2px solid #fff",
          }}>{xp.inventory.length}</span>
        )}
      </button>
 
      {/* inventory drawer */}
      {bagOpen && (
        <div style={{
          position:"fixed",
          bottom:88, left:20,
          width:"calc(100% - 40px)", maxWidth:380,
          background:"#fff",
          border:"0.5px solid #d3d1c7",
          borderRadius:20,
          padding:"14px 16px",
          boxShadow:"0 6px 20px rgba(0,0,0,0.12)",
          zIndex:140,
          maxHeight:"55vh",
          display:"flex",flexDirection:"column",
        }}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
            <p style={{fontSize:13,fontWeight:500,color:"#888780",margin:0}}>Inventory · {xp.inventory.length}</p>
            <button onClick={()=>setBagOpen(false)} style={{background:"transparent",border:"none",cursor:"pointer",color:"#888780",fontSize:18,padding:0}}>×</button>
          </div>
          {xp.inventory.length === 0 ? (
            <p style={{fontSize:13,color:"#888780",textAlign:"center",padding:"1.5rem 0"}}>Nothing yet. Level up to earn furniture.</p>
          ) : (
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(70px, 1fr))",gap:8,overflowY:"auto",paddingRight:4}}>
              {xp.inventory.map(item=>(
                <div key={item.id}
                  className="furn-item"
                  onMouseDown={(e)=>startDragInventory(e,item)}
                  onTouchStart={(e)=>startDragInventory(e,item)}
                  style={{
                    background:"#f1efe8",
                    borderRadius:14,
                    aspectRatio:"1/1",
                    cursor:"grab",
                    display:"flex",alignItems:"center",justifyContent:"center",
                    position:"relative",
                  }}
                  title={FURNITURE[item.furnId-1]?.name || ""}
                >
                  <Furniture furnId={item.furnId}/>
                  <span style={{position:"absolute",bottom:2,right:4,fontSize:9,color:"#888780"}}>L{item.furnId}</span>
                </div>
              ))}
            </div>
          )}
          <p style={{fontSize:11,color:"#888780",marginTop:10,textAlign:"center"}}>Drag items into your room. Drag from your room onto the bag to put them back.</p>
        </div>
      )}
    </div>
  );
}
 
// ---------- App ----------
function App() {
  const [tab,setTab]=useState(()=>load("pd_tab","todos"));
  const [accent,setAccent]=useState(()=>load("pd_accent","purple"));
  const [spaceOpen,setSpaceOpen]=useState(false);
  const xpHook = useXP();
  const { xp, award, placeFurniture, movePlaced, returnToInventory } = xpHook;
 
  useEffect(()=>save("pd_tab",tab),[tab]);
  useEffect(()=>save("pd_accent",accent),[accent]);
 
  const ac = COLORS[accent];
 
  const tabs = [
    {key:"todos", label:"To-do"},
    {key:"time", label:"Time"},
    {key:"habits", label:"Habits"},
    {key:"hydration", label:"Hydration"},
    {key:"mood", label:"Mood"},
    {key:"progress", label:"Progress"},
  ];
 
  return (
    <div style={{maxWidth:660,margin:"0 auto",padding:"1.5rem 1rem 4rem"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"1rem",gap:10}}>
        <h2 style={{fontSize:20,fontWeight:500,margin:0}}>My dashboard</h2>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <SettingsButton accent={accent} onChangeTheme={setAccent}/>
          {/* my space access circle */}
          <button onClick={()=>setSpaceOpen(true)} aria-label="My space" style={{
            background:ac.bg,
            border:`1.5px solid ${ac.border}`,
            borderRadius:"50%",
            width:38, height:38,
            cursor:"pointer",
            display:"flex",alignItems:"center",justifyContent:"center",
            padding:0,
            color:ac.text,
            position:"relative",
          }}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
              <path d="M3 12 L12 4 L21 12"/>
              <path d="M5 10 L5 20 L19 20 L19 10"/>
              <rect x="10" y="14" width="4" height="6"/>
            </svg>
            {xp.inventory.length>0 && (
              <span style={{
                position:"absolute",top:-3,right:-3,
                background:COLORS.coral.mid,color:"#fff",
                borderRadius:"50%",width:16,height:16,
                fontSize:10,fontWeight:600,
                display:"flex",alignItems:"center",justifyContent:"center",
                border:"2px solid #f5f4f0",
              }}>{xp.inventory.length}</span>
            )}
          </button>
        </div>
      </div>
 
      <div className="tab-bar" style={{display:"flex",gap:4,background:"#ebe9e2",borderRadius:40,padding:"5px 6px",marginBottom:"1.25rem",overflowX:"auto",flexWrap:"nowrap"}}>
        {tabs.map(t=>(
          <Tab key={t.key} label={t.label} active={tab===t.key} onClick={()=>setTab(t.key)} accent={accent}/>
        ))}
      </div>
 
      {tab==="todos"&&<Todos accent={accent} setAccent={setAccent} award={award}/>}
      {tab==="time"&&<TimeTracker accent={accent} award={award}/>}
      {tab==="habits"&&<Habits accent={accent} award={award}/>}
      {tab==="hydration"&&<Hydration accent={accent} award={award}/>}
      {tab==="mood"&&<MoodLogger accent={accent} award={award}/>}
      {tab==="progress"&&<Progress accent={accent} xp={xp}/>}
 
      {spaceOpen && <MySpace
        accent={accent}
        onClose={()=>setSpaceOpen(false)}
        xp={xp}
        placeFurniture={placeFurniture}
        movePlaced={movePlaced}
        returnToInventory={returnToInventory}
      />}
    </div>
  );
}
 
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
