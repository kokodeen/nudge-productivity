<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Dashboard</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f4f0; color: #1a1a18; min-height: 100vh; }
  input, select, button { font-family: inherit; }
  input[type=text], input[type=date], input[type=number], select {
    border-radius: 14px; border: 0.5px solid #d3d1c7; padding: 8px 14px;
    font-size: 14px; background: #f1efe8; color: #1a1a18; outline: none;
  }
  input[type=text]:focus, input[type=date]:focus, input[type=number]:focus, select:focus { border-color: #888780; }
  input[type=checkbox] { accent-color: #7f77dd; }
  input[type=number] { -moz-appearance: textfield; }
  input[type=number]::-webkit-outer-spin-button, input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  @media (prefers-color-scheme: dark) {
    body { background: #1c1c1a; color: #f0ede8; }
    input[type=text], input[type=date], input[type=number], select { background: #2c2c2a; border-color: #444441; color: #f0ede8; }
    .card { background: #2c2c2a !important; border-color: #444441 !important; }
    .tab-bar { background: #2c2c2a !important; }
    .metric { background: #2c2c2a !important; }
    .bar-bg { background: #444441 !important; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const COLORS = {
  purple: { bg: "#EEEDFE", border: "#AFA9EC", text: "#3C3489", mid: "#7F77DD" },
  teal:   { bg: "#E1F5EE", border: "#5DCAA5", text: "#085041", mid: "#1D9E75" },
  coral:  { bg: "#FAECE7", border: "#F0997B", text: "#712B13", mid: "#D85A30" },
  amber:  { bg: "#FAEEDA", border: "#EF9F27", text: "#633806", mid: "#BA7517" },
  green:  { bg: "#EAF3DE", border: "#97C459", text: "#27500A", mid: "#639922" },
};
const CAT_OPTIONS = ["Work","Personal","Health","Learning","Other"];
const CAT_COLOR = { Work:"purple", Personal:"teal", Health:"coral", Learning:"amber", Other:"green" };

function Badge({ cat }) {
  const c = COLORS[CAT_COLOR[cat] || "green"];
  return <span style={{ background:c.bg, color:c.text, border:`1px solid ${c.border}`, borderRadius:20, padding:"2px 10px", fontSize:12, fontWeight:500 }}>{cat}</span>;
}
function Card({ children, style={} }) {
  return <div className="card" style={{ background:"#fff", border:"0.5px solid #d3d1c7", borderRadius:20, padding:"1rem 1.25rem", ...style }}>{children}</div>;
}
function Tab({ label, active, onClick }) {
  return <button onClick={onClick} style={{ padding:"8px 20px", borderRadius:40, border: active?"1.5px solid #b4b2a9":"1.5px solid transparent", background: active?"#fff":"transparent", color: active?"#1a1a18":"#888780", fontWeight: active?500:400, fontSize:15, cursor:"pointer" }}>{label}</button>;
}
function Inp({ placeholder, value, onChange, style={} }) {
  return <input type="text" placeholder={placeholder} value={value} onChange={e=>onChange(e.target.value)} style={style} />;
}
function Sel({ value, onChange, options, style={} }) {
  return <select value={value} onChange={e=>onChange(e.target.value)} style={style}>{options.map(o=><option key={o}>{o}</option>)}</select>;
}
function Pill({ children, onClick, active, color="purple" }) {
  const c = COLORS[color];
  return <button onClick={onClick} style={{ borderRadius:40, padding:"4px 14px", fontSize:13, cursor:"pointer", fontWeight: active?500:400, background: active?c.bg:"transparent", color: active?c.text:"#888780", border: active?`1px solid ${c.border}`:"1px solid #d3d1c7" }}>{children}</button>;
}
function load(k,fb){ try{ const v=localStorage.getItem(k); return v?JSON.parse(v):fb; }catch{ return fb; } }
function save(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch{} }
function today(){ return new Date().toISOString().slice(0,10); }
function fmt(secs){ const h=Math.floor(secs/3600),m=Math.floor((secs%3600)/60),s=secs%60; if(h>0)return`${h}h ${m}m`; return`${m}m ${s}s`; }

function Todos() {
  const [todos,setTodos]=useState(()=>load("pd_todos",[]));
  const [text,setText]=useState(""); const [due,setDue]=useState(""); const [cat,setCat]=useState("Work"); const [filter,setFilter]=useState("All");
  useEffect(()=>save("pd_todos",todos),[todos]);
  function add(){ if(!text.trim())return; setTodos(t=>[...t,{id:Date.now(),text:text.trim(),due,cat,done:false}]); setText(""); setDue(""); }
  function toggle(id){ setTodos(t=>t.map(x=>x.id===id?{...x,done:!x.done}:x)); }
  function remove(id){ setTodos(t=>t.filter(x=>x.id!==id)); }
  const td=today(); const filtered=todos.filter(t=>filter==="All"?true:filter==="Active"?!t.done:t.done);
  const overdue=todos.filter(t=>!t.done&&t.due&&t.due<td).length;
  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        <Inp placeholder="What needs to be done?" value={text} onChange={setText} style={{flex:1,minWidth:140}} />
        <input type="date" value={due} onChange={e=>setDue(e.target.value)} />
        <Sel value={cat} onChange={setCat} options={CAT_OPTIONS} />
        <button onClick={add} style={{borderRadius:14,padding:"8px 20px",background:COLORS.purple.mid,color:"#fff",border:"none",fontWeight:500,fontSize:14,cursor:"pointer"}}>Add</button>
      </div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
        {["All","Active","Done"].map(f=><Pill key={f} active={filter===f} onClick={()=>setFilter(f)}>{f}</Pill>)}
        {overdue>0&&<span style={{marginLeft:"auto",fontSize:13,color:COLORS.coral.text,background:COLORS.coral.bg,borderRadius:20,padding:"3px 10px",border:`1px solid ${COLORS.coral.border}`}}>{overdue} overdue</span>}
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {filtered.length===0&&<p style={{color:"#888780",fontSize:14,textAlign:"center",padding:"1.5rem 0"}}>Nothing here yet</p>}
        {filtered.map(t=>{
          const ov=!t.done&&t.due&&t.due<td;
          return <Card key={t.id} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",opacity:t.done?.6:1}}>
            <input type="checkbox" checked={t.done} onChange={()=>toggle(t.id)} style={{width:18,height:18,flexShrink:0,cursor:"pointer"}} />
            <div style={{flex:1}}>
              <span style={{fontSize:15,textDecoration:t.done?"line-through":"none"}}>{t.text}</span>
              {t.due&&<span style={{marginLeft:8,fontSize:12,color:ov?COLORS.coral.text:"#888780"}}>{t.due}</span>}
            </div>
            <Badge cat={t.cat} />
            <button onClick={()=>remove(t.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#888780",fontSize:18,lineHeight:1,padding:"2px 4px",borderRadius:8}}>×</button>
          </Card>;
        })}
      </div>
      <div style={{display:"flex",gap:12}}>
        {[{v:todos.filter(t=>!t.done).length,l:"remaining"},{v:todos.filter(t=>t.done).length,l:"completed"},{v:(todos.length?Math.round(todos.filter(t=>t.done).length/todos.length*100):0)+"%",l:"done"}].map(({v,l})=>
          <div key={l} className="metric" style={{flex:1,textAlign:"center",background:"#f1efe8",borderRadius:16,padding:"12px 8px"}}>
            <p style={{fontSize:22,fontWeight:500,margin:0}}>{v}</p>
            <p style={{fontSize:12,color:"#888780",margin:0}}>{l}</p>
          </div>)}
      </div>
    </div>
  );
}

function TimeTracker() {
  const [entries,setEntries]=useState(()=>load("pd_time",[]));
  const [activity,setActivity]=useState(""); const [cat,setCat]=useState("Work");
  const [running,setRunning]=useState(null); const [elapsed,setElapsed]=useState(0);
  const ref=useRef(null);
  useEffect(()=>save("pd_time",entries),[entries]);
  useEffect(()=>{ if(running){ ref.current=setInterval(()=>setElapsed(Date.now()-running.startMs),500); }else{ clearInterval(ref.current); } return()=>clearInterval(ref.current); },[running]);
  function startStop(){ if(running){ const s=Math.round((Date.now()-running.startMs)/1000); if(s>0)setEntries(e=>[...e,{id:Date.now(),activity:running.activity,cat:running.cat,secs:s,date:today()}]); setRunning(null);setElapsed(0); }else{ if(!activity.trim())return; setRunning({activity:activity.trim(),cat,startMs:Date.now()}); setElapsed(0); } }
  function remove(id){ setEntries(e=>e.filter(x=>x.id!==id)); }
  const td=today(); const todayE=entries.filter(e=>e.date===td);
  const todayS=todayE.reduce((a,e)=>a+e.secs,0); const totalS=entries.reduce((a,e)=>a+e.secs,0);
  const byCat=CAT_OPTIONS.map(c=>({cat:c,secs:entries.filter(e=>e.cat===c).reduce((a,e)=>a+e.secs,0)})).filter(x=>x.secs>0);
  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <Card style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
        <Inp placeholder="Activity name" value={activity} onChange={setActivity} style={{flex:1,minWidth:140}} />
        <Sel value={cat} onChange={setCat} options={CAT_OPTIONS} />
        <button onClick={startStop} style={{borderRadius:14,padding:"8px 22px",background:running?COLORS.coral.mid:COLORS.teal.mid,color:"#fff",border:"none",fontWeight:500,fontSize:14,cursor:"pointer",minWidth:80}}>{running?"Stop":"Start"}</button>
      </Card>
      {running&&<Card style={{textAlign:"center",background:COLORS.teal.bg,border:`1px solid ${COLORS.teal.border}`}}>
        <p style={{fontSize:13,color:COLORS.teal.text,margin:"0 0 4px"}}>Tracking: {running.activity}</p>
        <p style={{fontSize:32,fontWeight:500,margin:0,color:COLORS.teal.text}}>{fmt(Math.round(elapsed/1000))}</p>
      </Card>}
      <div style={{display:"flex",gap:12}}>
        {[{v:fmt(todayS),l:"today"},{v:fmt(totalS),l:"total"},{v:todayE.length,l:"sessions today"}].map(({v,l})=>
          <div key={l} className="metric" style={{flex:1,textAlign:"center",background:"#f1efe8",borderRadius:16,padding:"12px 8px"}}>
            <p style={{fontSize:22,fontWeight:500,margin:0}}>{v}</p>
            <p style={{fontSize:12,color:"#888780",margin:0}}>{l}</p>
          </div>)}
      </div>
      {byCat.length>0&&<Card>
        <p style={{fontSize:13,fontWeight:500,margin:"0 0 10px",color:"#888780"}}>Time by category</p>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {byCat.map(({cat:c,secs})=>{ const pct=totalS?Math.round(secs/totalS*100):0; const col=COLORS[CAT_COLOR[c]||"green"]; return(
            <div key={c}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:3}}><span>{c}</span><span style={{color:"#888780"}}>{fmt(secs)} · {pct}%</span></div>
              <div className="bar-bg" style={{height:8,borderRadius:20,background:"#e8e6e0",overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:col.mid,borderRadius:20}}/></div>
            </div>);})}
        </div>
      </Card>}
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        <p style={{fontSize:13,fontWeight:500,color:"#888780"}}>Log</p>
        {entries.length===0&&<p style={{color:"#888780",fontSize:14,textAlign:"center",padding:"1.5rem 0"}}>No sessions logged yet</p>}
        {[...entries].reverse().map(e=>(
          <Card key={e.id} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 16px",borderRadius:16}}>
            <div style={{flex:1}}><span style={{fontSize:14}}>{e.activity}</span><span style={{marginLeft:8,fontSize:12,color:"#888780"}}>{e.date}</span></div>
            <Badge cat={e.cat} />
            <span style={{fontWeight:500,fontSize:14,minWidth:56,textAlign:"right"}}>{fmt(e.secs)}</span>
            <button onClick={()=>remove(e.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#888780",fontSize:18,lineHeight:1,padding:"2px 4px",borderRadius:8}}>×</button>
          </Card>))}
      </div>
    </div>
  );
}

function Habits() {
  const [habits,setHabits]=useState(()=>load("pd_habits",[]));
  const [name,setName]=useState(""); const [cat,setCat]=useState("Health");
  const td=today();
  useEffect(()=>save("pd_habits",habits),[habits]);
  function add(){ if(!name.trim())return; setHabits(h=>[...h,{id:Date.now(),name:name.trim(),cat,completions:[]}]); setName(""); }
  function toggle(id){ setHabits(h=>h.map(x=>{ if(x.id!==id)return x; const d=x.completions.includes(td); return{...x,completions:d?x.completions.filter(c=>c!==td):[...x.completions,td]}; })); }
  function remove(id){ setHabits(h=>h.filter(x=>x.id!==id)); }
  function streak(c){ let s=0,d=new Date(); while(true){ const ds=d.toISOString().slice(0,10); if(c.includes(ds)){s++;d.setDate(d.getDate()-1);}else break; } return s; }
  const last7=Array.from({length:7},(_,i)=>{ const d=new Date(); d.setDate(d.getDate()-(6-i)); return d.toISOString().slice(0,10); });
  const doneToday=habits.filter(h=>h.completions.includes(td)).length;
  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        <Inp placeholder="New habit" value={name} onChange={setName} style={{flex:1,minWidth:160}} />
        <Sel value={cat} onChange={setCat} options={CAT_OPTIONS} />
        <button onClick={add} style={{borderRadius:14,padding:"8px 20px",background:COLORS.coral.mid,color:"#fff",border:"none",fontWeight:500,fontSize:14,cursor:"pointer"}}>Add</button>
      </div>
      <div style={{display:"flex",gap:12}}>
        {[{v:`${doneToday}/${habits.length}`,l:"done today"},{v:`${habits.length?Math.round(doneToday/habits.length*100):0}%`,l:"completion rate"},{v:habits.reduce((a,h)=>Math.max(a,streak(h.completions)),0),l:"best streak"}].map(({v,l})=>
          <div key={l} className="metric" style={{flex:1,textAlign:"center",background:"#f1efe8",borderRadius:16,padding:"12px 8px"}}>
            <p style={{fontSize:22,fontWeight:500,margin:0}}>{v}</p>
            <p style={{fontSize:12,color:"#888780",margin:0}}>{l}</p>
          </div>)}
      </div>
      {habits.length===0&&<p style={{color:"#888780",fontSize:14,textAlign:"center",padding:"1.5rem 0"}}>Add your first habit above</p>}
      {habits.map(h=>{
        const done=h.completions.includes(td); const s=streak(h.completions); const col=COLORS[CAT_COLOR[h.cat]||"green"];
        return <Card key={h.id}>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
            <button onClick={()=>toggle(h.id)} style={{width:28,height:28,borderRadius:50,border:`2px solid ${done?col.mid:"#d3d1c7"}`,background:done?col.mid:"transparent",cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:16}}>{done?"✓":""}</button>
            <span style={{flex:1,fontSize:15}}>{h.name}</span>
            <Badge cat={h.cat} />
            {s>0&&<span style={{fontSize:13,color:COLORS.amber.text,background:COLORS.amber.bg,borderRadius:20,padding:"2px 10px",border:`1px solid ${COLORS.amber.border}`}}>{s} day streak</span>}
            <button onClick={()=>remove(h.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#888780",fontSize:18,lineHeight:1,padding:"2px 4px",borderRadius:8}}>×</button>
          </div>
          <div style={{display:"flex",gap:5}}>
            {last7.map(d=>{ const f=h.completions.includes(d); const it=d===td; return <div key={d} style={{flex:1,height:10,borderRadius:10,background:f?col.mid:"#e8e6e0",border:it?`1.5px solid ${col.border}`:"none"}}/>; })}
          </div>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
            {last7.map(d=><span key={d} style={{flex:1,fontSize:10,color:"#888780",textAlign:"center"}}>{"SMTWTFS"[new Date(d).getDay()]}</span>)}
          </div>
        </Card>;
      })}
    </div>
  );
}

function Hydration() {
  const [settings,setSettings]=useState(()=>load("pd_hydration",{portion:250,goal:2000,theme:"teal"}));
  const [log,setLog]=useState(()=>load("pd_hydration_log",[]));
  const [settingsOpen,setSettingsOpen]=useState(false);
  const td=today();
  useEffect(()=>save("pd_hydration",settings),[settings]);
  useEffect(()=>save("pd_hydration_log",log),[log]);
  const todayE=log.filter(e=>e.date===td);
  const todayMl=todayE.reduce((a,e)=>a+e.ml,0);
  const pct=Math.min(100,Math.round(todayMl/settings.goal*100));
  const col=COLORS[settings.theme]||COLORS.teal;
  function addWater(){setLog(l=>[...l,{id:Date.now(),ml:settings.portion,date:td}]);}
  function removeWater(){if(!todayE.length)return;const last=todayE[todayE.length-1];setLog(l=>l.filter(e=>e.id!==last.id));}
  const cx=100,cy=100,r=85;
  const fillH=Math.round(r*2*pct/100);
  const fillY=(cy+r)-fillH;
  const textOnWater=pct>=52;
  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <div style={{display:"flex",justifyContent:"flex-end"}}>
        <button onClick={()=>setSettingsOpen(s=>!s)} style={{background:settingsOpen?col.bg:"transparent",border:`1px solid ${settingsOpen?col.border:"#d3d1c7"}`,borderRadius:20,padding:"3px 12px",fontSize:12,color:settingsOpen?col.text:"#888780",cursor:"pointer"}}>Settings</button>
      </div>
      {settingsOpen&&<Card>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <p style={{fontSize:13,fontWeight:500,color:"#888780",margin:0}}>Hydration settings</p>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:14,flex:1}}>Portion size</span>
            <Sel value={String(settings.portion)} onChange={v=>setSettings(s=>({...s,portion:parseInt(v)}))} options={["125","250","500"]} />
            <span style={{fontSize:13,color:"#888780"}}>ml</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:14,flex:1}}>Daily goal</span>
            <input type="number" value={settings.goal} min={250} max={10000} step={250} onChange={e=>setSettings(s=>({...s,goal:Math.max(250,parseInt(e.target.value)||2000)}))} style={{width:80}} />
            <span style={{fontSize:13,color:"#888780"}}>ml</span>
          </div>
          <div>
            <p style={{fontSize:14,marginBottom:8}}>Colour theme</p>
            <div style={{display:"flex",gap:10}}>
              {Object.keys(COLORS).map(t=>(
                <button key={t} onClick={()=>setSettings(s=>({...s,theme:t}))} style={{width:30,height:30,borderRadius:"50%",background:COLORS[t].mid,border:settings.theme===t?`3px solid ${COLORS[t].text}`:"3px solid transparent",cursor:"pointer",outline:"none",padding:0,boxShadow:settings.theme===t?`0 0 0 2px ${COLORS[t].bg}`:"none"}} />
              ))}
            </div>
          </div>
        </div>
      </Card>}
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:20,padding:"0.5rem 0"}}>
        <div style={{position:"relative",width:200,height:200}}>
          <svg width="200" height="200" viewBox="0 0 200 200">
            <defs><clipPath id="hydrationClip"><circle cx={cx} cy={cy} r={r}/></clipPath></defs>
            <circle cx={cx} cy={cy} r={r} fill={col.bg}/>
            {pct>0&&<path
              d={pct>=99
                ?`M ${cx-r} ${fillY} L ${cx+r} ${fillY} L ${cx+r} ${cy+r+2} L ${cx-r} ${cy+r+2} Z`
                :`M ${cx-r} ${fillY} Q ${cx-r/2} ${fillY-8} ${cx} ${fillY} Q ${cx+r/2} ${fillY+8} ${cx+r} ${fillY} L ${cx+r} ${cy+r+2} L ${cx-r} ${cy+r+2} Z`
              }
              fill={col.mid} opacity="0.55" clipPath="url(#hydrationClip)"
            />}
            <circle cx={cx} cy={cy} r={r} fill="none" stroke={col.border} strokeWidth="2.5"/>
          </svg>
          <div style={{position:"absolute",top:0,left:0,width:"100%",height:"100%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",pointerEvents:"none"}}>
            <span style={{fontSize:30,fontWeight:500,color:textOnWater?"#fff":col.text,lineHeight:1}}>{todayMl}</span>
            <span style={{fontSize:12,color:textOnWater?"rgba(255,255,255,0.8)":"#888780",marginTop:2}}>of {settings.goal} ml</span>
            {pct>=100&&<span style={{fontSize:11,marginTop:4,color:"#fff",fontWeight:500}}>Goal reached!</span>}
          </div>
        </div>
        <span style={{fontSize:13,color:col.text,background:col.bg,borderRadius:20,padding:"4px 14px",border:`1px solid ${col.border}`}}>{pct}% of daily goal</span>
        <div style={{display:"flex",alignItems:"center",gap:24}}>
          <button onClick={removeWater} disabled={!todayE.length} style={{width:52,height:52,borderRadius:"50%",background:"transparent",border:"1.5px solid #d3d1c7",color:"#888780",fontSize:26,cursor:todayE.length?"pointer":"default",display:"flex",alignItems:"center",justifyContent:"center",opacity:todayE.length?1:0.4}}>−</button>
          <div style={{textAlign:"center",minWidth:70}}>
            <p style={{fontSize:13,color:"#888780",margin:0}}>{settings.portion} ml</p>
            <p style={{fontSize:11,color:"#aaa8a2",margin:0}}>per tap</p>
          </div>
          <button onClick={addWater} style={{width:52,height:52,borderRadius:"50%",background:col.mid,border:"none",color:"#fff",fontSize:26,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
        </div>
      </div>
      <div style={{display:"flex",gap:12}}>
        {[{v:todayMl,l:"ml today"},{v:settings.goal,l:"ml goal"},{v:todayE.length,l:"portions"}].map(({v,l})=>
          <div key={l} className="metric" style={{flex:1,textAlign:"center",background:"#f1efe8",borderRadius:16,padding:"12px 8px"}}>
            <p style={{fontSize:22,fontWeight:500,margin:0}}>{v}</p>
            <p style={{fontSize:12,color:"#888780",margin:0}}>{l}</p>
          </div>)}
      </div>
    </div>
  );
}

function App() {
  const [tab,setTab]=useState("todos");
  return (
    <div style={{maxWidth:660,margin:"0 auto",padding:"1.5rem 1rem"}}>
      <h2 style={{fontSize:20,fontWeight:500,margin:"0 0 1.25rem"}}>My dashboard</h2>
      <div className="tab-bar" style={{display:"flex",gap:6,background:"#ebe9e2",borderRadius:40,padding:"5px 6px",marginBottom:"1.25rem",width:"fit-content",flexWrap:"wrap"}}>
        <Tab label="To-do" active={tab==="todos"} onClick={()=>setTab("todos")} />
        <Tab label="Time tracker" active={tab==="time"} onClick={()=>setTab("time")} />
        <Tab label="Habits" active={tab==="habits"} onClick={()=>setTab("habits")} />
        <Tab label="Hydration" active={tab==="hydration"} onClick={()=>setTab("hydration")} />
      </div>
      {tab==="todos"&&<Todos/>}
      {tab==="time"&&<TimeTracker/>}
      {tab==="habits"&&<Habits/>}
      {tab==="hydration"&&<Hydration/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
