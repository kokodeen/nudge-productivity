// LEVEL-UP ANIMATIONS
// ============================================================
function LevelUpOverlay({ flash, onClose }){
  if(!flash) return null;
  const isLv30 = flash.milestone==="lv30";
  const isLv40 = flash.milestone==="lv40";
  const isLv100 = flash.milestone==="lv100";

  // Stars for the lv30 animation
  const stars = Array.from({length:14}).map((_,i)=>{
    const a = (i/14)*Math.PI*2;
    const r = 100 + (i%3)*30;
    return { x: 50 + Math.cos(a)*r/4, y: 50 + Math.sin(a)*r/4, delay: (i*0.1).toFixed(2) };
  });

  return <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",backdropFilter:"blur(4px)",zIndex:10000,display:"flex",alignItems:"center",justifyContent:"center",animation:"fadeUp 0.3s ease-out",padding:20}}>
    <div onClick={e=>e.stopPropagation()} style={{position:"relative",width:"100%",maxWidth:340,background:"#fff",borderRadius:24,padding:"2.5rem 1.5rem",textAlign:"center",animation:"celebPop 0.6s cubic-bezier(.4,1.4,.5,1)"}}>
      {isLv100 ? <>
        <div style={{display:"flex",justifyContent:"center",gap:6,marginBottom:14}}>
          {[0,1,2,3,4].map(i=><div key={i} style={{animation:`celebPop 0.7s ease-out ${i*0.12}s both`}}><GoldSVG design={i} size={44}/></div>)}
        </div>
        <p style={{fontSize:14,color:COLORS.amber.text,fontWeight:500,margin:"0 0 6px",letterSpacing:1}}>LEVEL 100</p>
        <p style={{fontSize:22,fontWeight:600,margin:"0 0 10px",background:"linear-gradient(90deg, #B8860B, #E9C46A, #B8860B)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text"}}>You're an expert.</p>
        <p style={{fontSize:13,color:"#666",lineHeight:1.5,margin:"0 0 16px"}}>One hundred levels of focus, habits, and care. You've unlocked the golden set — five rare pieces just for you.</p>
        <button onClick={onClose} style={{borderRadius:14,padding:"8px 22px",background:COLORS.amber.mid,color:"#fff",border:"none",fontWeight:500,fontSize:14,cursor:"pointer"}}>Amazing</button>
      </> : isLv30 ? <>
        <div style={{position:"relative",height:120,marginBottom:8}}>
          {stars.map((s,i)=>(
            <svg key={i} width="20" height="20" viewBox="0 0 24 24" style={{position:"absolute",left:`${s.x}%`,top:`${s.y}%`,transform:"translate(-50%,-50%)",animation:`starTwinkle 1.4s ease-in-out ${s.delay}s infinite`}}>
              <path d="M12 2 L14 9 L21 9 L15.5 13.5 L17.5 21 L12 16.5 L6.5 21 L8.5 13.5 L3 9 L10 9 Z" fill={COLORS.amber.mid}/>
            </svg>
          ))}
          <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
            <p style={{fontSize:48,fontWeight:600,margin:0,color:COLORS.purple.text}}>Lv 30</p>
          </div>
        </div>
        <p style={{fontSize:13,color:"#666",margin:"0 0 16px",lineHeight:1.5}}>Wallpapers and floors are unlocked! Find them in your bag.</p>
        <button onClick={onClose} style={{borderRadius:14,padding:"8px 22px",background:COLORS.purple.mid,color:"#fff",border:"none",fontWeight:500,fontSize:14,cursor:"pointer"}}>Continue</button>
      </> : isLv40 ? <>
        <p style={{fontSize:36,fontWeight:600,margin:"0 0 8px",color:COLORS.teal.text}}>Lv 40</p>
        <p style={{fontSize:13,color:"#666",margin:"0 0 16px",lineHeight:1.5}}>Textured wallpapers and floors are now unlocking — wood, marble, animals, and more.</p>
        <button onClick={onClose} style={{borderRadius:14,padding:"8px 22px",background:COLORS.teal.mid,color:"#fff",border:"none",fontWeight:500,fontSize:14,cursor:"pointer"}}>Nice</button>
      </> : <>
        <p style={{fontSize:36,fontWeight:600,margin:"0 0 8px",color:COLORS.purple.text}}>Lv {flash.level}</p>
        <p style={{fontSize:13,color:"#666",margin:"0 0 16px"}}>New item unlocked in your bag!</p>
        <button onClick={onClose} style={{borderRadius:14,padding:"8px 22px",background:COLORS.purple.mid,color:"#fff",border:"none",fontWeight:500,fontSize:14,cursor:"pointer"}}>Cool</button>
      </>}
    </div>
  </div>;
}

// ============================================================
// ERROR BOUNDARY — prevents blank page if anything crashes
// ============================================================
class ErrorBoundary extends React.Component {
  constructor(props){ super(props); this.state = { error:null, info:null }; }
  static getDerivedStateFromError(error){ return { error }; }
  componentDidCatch(error, info){ this.setState({ info }); console.error("App crashed:", error, info); }
  reset(){
    if(window.confirm("Reset all saved data? This will clear your todos, habits, time logs, water log, mood log, level, and room.")){
      try { localStorage.clear(); } catch(e){}
      window.location.reload();
    }
  }
  render(){
    if(this.state.error){
      return <div style={{maxWidth:560,margin:"2rem auto",padding:"1.5rem",background:"#fff",border:"1px solid #d3d1c7",borderRadius:20,fontFamily:"sans-serif"}}>
        <h2 style={{fontSize:18,margin:"0 0 12px",color:"#712B13"}}>Something went wrong</h2>
        <p style={{fontSize:14,color:"#555",margin:"0 0 12px",lineHeight:1.5}}>The app hit an error and couldn't load. This is often caused by saved data from an older version.</p>
        <p style={{fontSize:12,fontFamily:"monospace",background:"#FAECE7",color:"#712B13",padding:"10px 12px",borderRadius:10,margin:"0 0 14px",wordBreak:"break-word"}}>{String(this.state.error && this.state.error.message)}</p>
        <button onClick={()=>this.reset()} style={{borderRadius:14,padding:"8px 20px",background:"#D85A30",color:"#fff",border:"none",fontWeight:500,fontSize:14,cursor:"pointer"}}>Reset saved data</button>
        <p style={{fontSize:11,color:"#A08C8C",marginTop:14}}>If the error keeps happening after reset, please report it.</p>
      </div>;
    }
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
</body>
</html>
