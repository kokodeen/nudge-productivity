<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Dashboard</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f4f0; color: #1a1a18; min-height: 100vh; }
  input, select, button { font-family: inherit; }
  input[type=text], input[type=date], input[type=number], select {
    border-radius: 14px; border: 0.5px solid #d3d1c7; padding: 8px 14px;
    font-size: 14px; background: #f1efe8; color: #1a1a18; outline: none;
  }
  input[type=text]:focus, input[type=date]:focus, input[type=number]:focus, select:focus { border-color: #888780; }
  input[type=checkbox] { accent-color: #7f77dd; }
  input[type=number] { -moz-appearance: textfield; }
  input[type=number]::-webkit-outer-spin-button, input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  @media (prefers-color-scheme: dark) {
    body { background: #1c1c1a; color: #f0ede8; }
    input[type=text], input[type=date], input[type=number], select { background: #2c2c2a; border-color: #444441; color: #f0ede8; }
    .card { background: #2c2c2a !important; border-color: #444441 !important; }
    .tab-bar { background: #2c2c2a !important; }
    .metric { background: #2c2c2a !important; }
    .bar-bg { background: #444441 !important; }
  }
  .furn-item { user-select: none; -webkit-user-select: none; touch-action: none; }
  .lvflash { animation: lvflashAnim 1.2s ease-out; }
  @keyframes lvflashAnim { 0%{transform:scale(0.6);opacity:0;} 30%{transform:scale(1.1);opacity:1;} 100%{transform:scale(1);opacity:1;} }
  @keyframes starTwinkle { 0%,100%{opacity:0.3;transform:scale(0.8);} 50%{opacity:1;transform:scale(1.1);} }
  @keyframes goldShine { 0%,100%{filter:drop-shadow(0 0 3px gold);} 50%{filter:drop-shadow(0 0 10px gold);} }
  @keyframes fadeUp { 0%{opacity:0;transform:translateY(20px);} 100%{opacity:1;transform:translateY(0);} }
  @keyframes celebPop { 0%{opacity:0;transform:scale(0.5);} 60%{transform:scale(1.1);} 100%{opacity:1;transform:scale(1);} }
  /* Shrinkable tab bar — labels truncate, never wrap */
  .tab-bar-inner { display:flex; gap:4px; min-width:0; }
  .tab-btn { flex:1 1 0; min-width:0; padding:8px 6px; border-radius:40px; font-size:13px; cursor:pointer; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  @media (max-width: 480px) { .tab-btn { font-size:11px; padding:7px 4px; } }
  @media (max-width: 380px) { .tab-btn { font-size:10px; padding:6px 3px; } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

const COLORS = {
  purple: { bg: "#EEEDFE", border: "#AFA9EC", text: "#3C3489", mid: "#7F77DD" },
  teal:   { bg: "#E1F5EE", border: "#5DCAA5", text: "#085041", mid: "#1D9E75" },
  coral:  { bg: "#FAECE7", border: "#F0997B", text: "#712B13", mid: "#D85A30" },
  amber:  { bg: "#FAEEDA", border: "#EF9F27", text: "#633806", mid: "#BA7517" },
  green:  { bg: "#EAF3DE", border: "#97C459", text: "#27500A", mid: "#639922" },
  pink:   { bg: "#FBE7EE", border: "#F09BBC", text: "#7A1F44", mid: "#D54B82" },
  sky:    { bg: "#E2EFFB", border: "#8AB8E8", text: "#0E3A66", mid: "#3C82C7" },
};
const CAT_OPTIONS = ["Work","Personal","Health","Learning","Other"];
const CAT_COLOR = { Work:"purple", Personal:"teal", Health:"coral", Learning:"amber", Other:"green" };
const URGENCY_OPTIONS = ["Low","Medium","High","Critical"];
const URGENCY_RANK = { Critical:0, High:1, Medium:2, Low:3 };
const URGENCY_COLOR = { Critical:"coral", High:"amber", Medium:"purple", Low:"green" };

function load(k,fb){ try{ const v=localStorage.getItem(k); return v?JSON.parse(v):fb; }catch{ return fb; } }
function save(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch{} }
function today(){ return new Date().toISOString().slice(0,10); }
function fmt(secs){ const h=Math.floor(secs/3600),m=Math.floor((secs%3600)/60),s=secs%60; if(h>0)return`${h}h ${m}m`; return`${m}m ${s}s`; }
function fmtClock(secs){ const m=Math.floor(secs/60),s=secs%60; return `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`; }

// ============================================================
// XP / LEVEL / REWARD SYSTEM
// ============================================================
const XP_PER_LEVEL = 70;
const XP_PER_ACTION = 5;
const MAX_LEVEL = 100;

// Rewards per level:
// L1..29  -> 1 furniture (29 unique designs)
// L30..39 -> 1 furniture + 1 PLAIN wallpaper or floor (alternating: 30=wall, 31=floor...)
//           5 plain walls (indices 0..4), 5 plain floors (indices 0..4)
// L40..99 -> 1 furniture + 1 TEXTURED wallpaper or floor (alternating: 40=wall, 41=floor...)
//           30 textured walls, 30 textured floors (indices 0..29)
// L100   -> golden set of 5 special items (no furniture/wallpaper this level)
function rewardsForLevel(level){
  if(level < 1 || level > MAX_LEVEL) return [];
  if(level === 100){
    return [
      { kind:"golden", design:0 },
      { kind:"golden", design:1 },
      { kind:"golden", design:2 },
      { kind:"golden", design:3 },
      { kind:"golden", design:4 },
    ];
  }
  if(level <= 29){
    return [{ kind:"furniture", design: level-1 }];
  }
  if(level <= 39){
    const rel = level - 30;            // 0..9
    const isWall = (rel % 2 === 0);    // 30,32,34,36,38 = wall
    const plainIdx = Math.floor(rel/2);// 0..4
    return [
      { kind:"furniture", design: level-1 }, // 29..38 (unique)
      isWall
        ? { kind:"wallpaper", design: plainIdx, plain:true }
        : { kind:"floor",     design: plainIdx, plain:true }
    ];
  }
  // 40..99
  const rel = level - 40;             // 0..59
  const isWall = (rel % 2 === 0);
  const texIdx = Math.floor(rel/2);   // 0..29
  return [
    { kind:"furniture", design: level-1 }, // 39..98
    isWall
      ? { kind:"wallpaper", design: 5+texIdx, plain:false }
      : { kind:"floor",     design: 5+texIdx, plain:false }
  ];
}

function useXP() {
  // Migrate old inventory/room items that lack kind/design (from earlier app version)
  function migrateItems(arr){
    return arr.map(it=>{
      if(it.kind) return it;
      // old item only had {id, level}; treat as furniture, design = level-1
      const lvl = typeof it.level==='number' ? it.level : 1;
      return { ...it, kind:"furniture", design: Math.max(0, Math.min(28, lvl-1)) };
    });
  }
  const [xp,setXp] = useState(()=>load("pd_xp",{level:1, xp:0, totalGained:0}));
  const [inv,setInv] = useState(()=>migrateItems(load("pd_inventory",[])));
  const [room,setRoom] = useState(()=>migrateItems(load("pd_room",[])));
  const [activeWall,setActiveWall] = useState(()=>load("pd_wall",null));
  const [activeFloor,setActiveFloor] = useState(()=>load("pd_floor",null));
  const [flash,setFlash] = useState(null);
  useEffect(()=>save("pd_xp",xp),[xp]);
  useEffect(()=>save("pd_inventory",inv),[inv]);
  useEffect(()=>save("pd_room",room),[room]);
  useEffect(()=>save("pd_wall",activeWall),[activeWall]);
  useEffect(()=>save("pd_floor",activeFloor),[activeFloor]);

  function addXP(amount){
    setXp(prev=>{
      if(prev.level>=MAX_LEVEL && prev.xp>=XP_PER_LEVEL) return prev;
      let newLevel = prev.level;
      let newXp = prev.xp + amount;
      const unlocked = [];
      while(newXp >= XP_PER_LEVEL && newLevel < MAX_LEVEL){
        newXp -= XP_PER_LEVEL;
        newLevel += 1;
        unlocked.push(newLevel);
      }
      if(newLevel>=MAX_LEVEL){ newXp = Math.min(newXp, XP_PER_LEVEL); }
      if(unlocked.length){
        const newItems = [];
        for(const lvl of unlocked){
          for(const r of rewardsForLevel(lvl)){
            newItems.push({ id:`item_${lvl}_${r.kind}_${r.design}_${Math.random().toString(36).slice(2,8)}`, level:lvl, ...r });
          }
        }
        if(newItems.length) setInv(curr=>[...curr, ...newItems]);
        let milestone = null;
        if(unlocked.includes(100)) milestone = "lv100";
        else if(unlocked.includes(30)) milestone = "lv30";
        else if(unlocked.includes(40)) milestone = "lv40";
        const lastLvl = unlocked[unlocked.length-1];
        setFlash({ level:lastLvl, milestone });
        setTimeout(()=>setFlash(null), milestone==="lv100"?6500:milestone==="lv30"?4200:milestone==="lv40"?3500:2200);
      }
      return { level:newLevel, xp:newXp, totalGained:prev.totalGained+amount };
    });
  }

  function removeXP(amount){
    setXp(prev=>{
      let newLevel = prev.level;
      let newXp = prev.xp - amount;
      const levelsLost = [];
      while(newXp < 0 && newLevel > 1){
        levelsLost.push(newLevel);
        newLevel -= 1;
        newXp += XP_PER_LEVEL;
      }
      if(newXp<0) newXp = 0;
      if(levelsLost.length){
        const lostSet = new Set(levelsLost);
        setInv(curr=>curr.filter(it=>!lostSet.has(it.level)));
        setRoom(rc=>rc.filter(it=>!lostSet.has(it.level)));
        setActiveWall(w=> (w && lostSet.has(w.level)) ? null : w);
        setActiveFloor(f=> (f && lostSet.has(f.level)) ? null : f);
      }
      return { level:newLevel, xp:newXp, totalGained:Math.max(0,prev.totalGained-amount) };
    });
  }

  return { xp, inv, setInv, room, setRoom, addXP, removeXP, flash, setFlash, activeWall, setActiveWall, activeFloor, setActiveFloor };
}

// Render a swatch preview of a wall/floor design (small icon, e.g. for inventory).

function FloorSwatch({ design, plain, size=44 }){

function inventoryItemName(it){
  if(it.kind==="furniture") return FURN_NAMES[it.design % FURN_NAMES.length];
  if(it.kind==="golden")    return GOLD_NAMES[it.design];
  if(it.kind==="wallpaper") return it.plain ? `Plain wall ${it.design+1}` : TEX_WALL_THEMES[it.design-5]?.name;
  if(it.kind==="floor")     return it.plain ? `Plain floor ${it.design+1}` : TEX_FLOOR_THEMES[it.design-5]?.name;
  return "Item";
}
function InventoryItemPreview({ it, size=44 }){
  if(it.kind==="furniture") return <FurnSVG design={it.design} size={size}/>;
  if(it.kind==="golden")    return <GoldSVG design={it.design} size={size}/>;
  if(it.kind==="wallpaper") return <WallSwatch design={it.design} plain={it.plain} size={size}/>;
  if(it.kind==="floor")     return <FloorSwatch design={it.design} plain={it.plain} size={size}/>;
  return null;
}

// ============================================================
// AWARDS (anti-spam keys)
// ============================================================
function useAwards(){
  const [awards,setAwards] = useState(()=>load("pd_awards",{}));
  useEffect(()=>save("pd_awards",awards),[awards]);
  function has(key){ return !!awards[key]; }
  function add(key){ setAwards(a=>({...a,[key]:Date.now()})); }
  function remove(key){ setAwards(a=>{ const n={...a}; delete n[key]; return n; }); }
  return { has, add, remove };
}

// ============================================================
// TODOS  (with archive, urgency sort)
// ============================================================
function Todos({ xpApi, awards }) {
  const [todos,setTodos]=useState(()=>load("pd_todos",[]));
  const [archive,setArchive]=useState(()=>load("pd_archive",[]));
  const [text,setText]=useState(""); const [due,setDue]=useState(""); const [cat,setCat]=useState("Work"); const [urgency,setUrgency]=useState("Medium");
  const [showArchive,setShowArchive]=useState(false);
  const [settings,setSettings]=useState(()=>load("pd_todos_settings",{theme:"purple"}));
  const [settingsOpen,setSettingsOpen]=useState(false);
  useEffect(()=>save("pd_todos",todos),[todos]);
  useEffect(()=>save("pd_archive",archive),[archive]);
  useEffect(()=>save("pd_todos_settings",settings),[settings]);

  function add(){
    if(!text.trim()) return;
    setTodos(t=>[...t,{id:Date.now(),text:text.trim(),due,cat,urgency,done:false}]);
    setText(""); setDue(""); setUrgency("Medium");
  }

  function toggle(id){
    // Toggle DONE on an active todo. Awards XP first time, refunds on untick.
    setTodos(prev=>{
      const t = prev.find(x=>x.id===id);
      if(!t) return prev;
      const newDone = !t.done;
      const key = `todo_done_${t.id}`;
      if(newDone){
        if(!awards.has(key)){ xpApi.addXP(XP_PER_ACTION); awards.add(key); }
        // Move to archive
        setArchive(a=>[{...t,done:true,doneAt:Date.now()}, ...a]);
        return prev.filter(x=>x.id!==id);
      } else {
        // Shouldn't really happen since done items now live in archive,
        // but keep safe behaviour just in case.
        if(awards.has(key)){ xpApi.removeXP(XP_PER_ACTION); awards.remove(key); }
        return prev.map(x=>x.id===id?{...x,done:false}:x);
      }
    });
  }

  // Un-archive: bring back an archived task to active list. Refunds XP.
  function unarchive(id){
    setArchive(prev=>{
      const t = prev.find(x=>x.id===id);
      if(!t) return prev;
      const key = `todo_done_${t.id}`;
      if(awards.has(key)){ xpApi.removeXP(XP_PER_ACTION); awards.remove(key); }
      setTodos(curr=>[...curr,{...t,done:false}]);
      return prev.filter(x=>x.id!==id);
    });
  }

  // Cross off an archived task (delete it). No XP penalty.
  function crossOffArchived(id){
    setArchive(prev=>prev.filter(x=>x.id!==id));
    // Note: we do NOT clear the awards key, so re-adding+completing the same id can't double-award.
  }

  function removeActive(id){
    // Deleting an active (unchecked) todo never awarded XP, so nothing to refund.
    setTodos(prev=>prev.filter(x=>x.id!==id));
  }

  const td=today();
  const sorted = useMemo(()=>{
    const arr = [...todos];
    arr.sort((a,b)=>{
      const ua = URGENCY_RANK[a.urgency||"Medium"];
      const ub = URGENCY_RANK[b.urgency||"Medium"];
      if(ua!==ub) return ua-ub;
      if(a.due && b.due) return a.due.localeCompare(b.due);
      if(a.due) return -1;
      if(b.due) return 1;
      return a.id-b.id;
    });
    return arr;
  },[todos]);

  const overdue=todos.filter(t=>t.due&&t.due<td).length;
  const col = COLORS[settings.theme];

  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <div style={{display:"flex",justifyContent:"flex-end"}}><SettingsButton open={settingsOpen} onToggle={()=>setSettingsOpen(s=>!s)} color={settings.theme}/></div>
      {settingsOpen&&<ThemeSettingsCard value={settings.theme} onChange={v=>setSettings(s=>({...s,theme:v}))} />}

      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        <Inp placeholder="What needs to be done?" value={text} onChange={setText} style={{flex:1,minWidth:140}} />
        <input type="date" value={due} onChange={e=>setDue(e.target.value)} />
        <Sel value={cat} onChange={setCat} options={CAT_OPTIONS} />
        <Sel value={urgency} onChange={setUrgency} options={URGENCY_OPTIONS} />
        <button onClick={add} style={{borderRadius:14,padding:"8px 20px",background:col.mid,color:"#fff",border:"none",fontWeight:500,fontSize:14,cursor:"pointer"}}>Add</button>
      </div>

      <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
        <Pill active={!showArchive} onClick={()=>setShowArchive(false)} color={settings.theme}>Active ({todos.length})</Pill>
        <Pill active={showArchive} onClick={()=>setShowArchive(true)} color={settings.theme}>Archived ({archive.length})</Pill>
        {!showArchive && overdue>0 && <span style={{marginLeft:"auto",fontSize:13,color:COLORS.coral.text,background:COLORS.coral.bg,borderRadius:20,padding:"3px 10px",border:`1px solid ${COLORS.coral.border}`}}>{overdue} overdue</span>}
      </div>

      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {!showArchive && sorted.length===0 && <p style={{color:"#888780",fontSize:14,textAlign:"center",padding:"1.5rem 0"}}>Nothing here yet</p>}
        {!showArchive && sorted.map(t=>{
          const ov=t.due && t.due<td;
          return <Card key={t.id} style={{display:"flex",alignItems:"center",gap:10,padding:"12px 16px",flexWrap:"wrap"}}>
            <input type="checkbox" checked={false} onChange={()=>toggle(t.id)} style={{width:18,height:18,flexShrink:0,cursor:"pointer",accentColor:col.mid}} />
            <div style={{flex:1,minWidth:120}}>
              <span style={{fontSize:15}}>{t.text}</span>
              {t.due&&<span style={{marginLeft:8,fontSize:12,color:ov?COLORS.coral.text:"#888780"}}>{t.due}</span>}
            </div>
            <UrgencyBadge u={t.urgency||"Medium"} />
            <Badge cat={t.cat} />
            <button onClick={()=>removeActive(t.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#888780",fontSize:18,lineHeight:1,padding:"2px 4px",borderRadius:8}}>×</button>
          </Card>;
        })}

        {showArchive && archive.length===0 && <p style={{color:"#888780",fontSize:14,textAlign:"center",padding:"1.5rem 0"}}>No archived tasks yet</p>}
        {showArchive && archive.map(t=>(
          <Card key={t.id} style={{display:"flex",alignItems:"center",gap:10,padding:"12px 16px",opacity:0.75,flexWrap:"wrap"}}>
            <input type="checkbox" checked={true} onChange={()=>unarchive(t.id)} style={{width:18,height:18,flexShrink:0,cursor:"pointer",accentColor:col.mid}} title="Un-archive (refunds XP)"/>
            <div style={{flex:1,minWidth:120}}>
              <span style={{fontSize:15,textDecoration:"line-through"}}>{t.text}</span>
              {t.due&&<span style={{marginLeft:8,fontSize:12,color:"#888780"}}>{t.due}</span>}
            </div>
            <UrgencyBadge u={t.urgency||"Medium"} />
            <Badge cat={t.cat} />
            <button onClick={()=>crossOffArchived(t.id)} title="Cross off (no XP penalty)" style={{background:"none",border:"none",cursor:"pointer",color:"#888780",fontSize:18,lineHeight:1,padding:"2px 4px",borderRadius:8}}>×</button>
          </Card>
        ))}
      </div>

      <div style={{display:"flex",gap:12}}>
        {[
          {v:todos.length,l:"remaining"},
          {v:archive.length,l:"completed"},
          {v:(todos.length+archive.length)?Math.round(archive.length/(todos.length+archive.length)*100)+"%":"0%",l:"done"}
        ].map(({v,l})=>
          <div key={l} className="metric" style={{flex:1,textAlign:"center",background:"#f1efe8",borderRadius:16,padding:"12px 8px"}}>
            <p style={{fontSize:22,fontWeight:500,margin:0}}>{v}</p>
            <p style={{fontSize:12,color:"#888780",margin:0}}>{l}</p>
          </div>)}
      </div>
    </div>
  );
}

// ============================================================
// TIME TRACKER (count up / down, XP per 10 min of total tracked time)
// ============================================================
function TimeTracker({ xpApi, awards }) {
  const [entries,setEntries]=useState(()=>load("pd_time",[]));
  const [activity,setActivity]=useState(""); const [cat,setCat]=useState("Work");
  const [running,setRunning]=useState(null); const [elapsed,setElapsed]=useState(0);
  const [settings,setSettings]=useState(()=>load("pd_time_settings",{theme:"teal",mode:"up",cdMinutes:25}));
  const [settingsOpen,setSettingsOpen]=useState(false);
  const intervalRef=useRef(null);
  const completedRef = useRef(false);
  useEffect(()=>save("pd_time",entries),[entries]);
  useEffect(()=>save("pd_time_settings",settings),[settings]);

  // After entries change, re-evaluate how many 10-min XP awards we should hold.
  // Award key: time_milestone_<N>  where N = 1..floor(totalSeconds/600).
  // We add awards for any N <= floor(total/600) that we don't yet have,
  // and remove awards (refund XP) for any N > floor(total/600) that we do have.
  useEffect(()=>{
    const totalSec = entries.reduce((a,e)=>a+e.secs,0);
    const should = Math.floor(totalSec/600); // each 10 min = 1 award
    // grant missing
    for(let i=1;i<=should;i++){
      const key = `time_milestone_${i}`;
      if(!awards.has(key)){ awards.add(key); xpApi.addXP(XP_PER_ACTION); }
    }
    // refund excess (e.g. after delete)
    let n = should+1;
    while(awards.has(`time_milestone_${n}`)){
      awards.remove(`time_milestone_${n}`);
      xpApi.removeXP(XP_PER_ACTION);
      n++;
    }
  // eslint-disable-next-line
  },[entries]);

  useEffect(()=>{
    if(running){
      intervalRef.current=setInterval(()=>{
        const sec = Math.floor((Date.now()-running.startMs)/1000);
        setElapsed(sec);
        if(running.mode==="down" && sec>=running.totalSec && !completedRef.current){
          completedRef.current = true;
          finishSession(running.totalSec);
        }
      },250);
    } else { clearInterval(intervalRef.current); }
    return ()=>clearInterval(intervalRef.current);
  // eslint-disable-next-line
  },[running]);

  function finishSession(secs){
    if(secs>0 && running){
      setEntries(e=>[...e,{id:Date.now(),activity:running.activity,cat:running.cat,secs,date:today(),mode:running.mode}]);
    }
    setRunning(null); setElapsed(0); completedRef.current = false;
  }

  function startStop(){
    if(running){
      const sec = Math.floor((Date.now()-running.startMs)/1000);
      const recorded = running.mode==="down" ? Math.min(sec, running.totalSec) : sec;
      finishSession(recorded);
    } else {
      if(!activity.trim()) return;
      const totalSec = settings.mode==="down" ? Math.max(60, settings.cdMinutes*60) : 0;
      setRunning({activity:activity.trim(),cat,startMs:Date.now(),mode:settings.mode,totalSec});
      setElapsed(0); completedRef.current=false;
    }
  }

  function remove(id){
    setEntries(arr=>arr.filter(x=>x.id!==id));
    // XP refund handled by useEffect re-evaluating milestones.
  }

  const td=today(); const todayE=entries.filter(e=>e.date===td);
  const todayS=todayE.reduce((a,e)=>a+e.secs,0); const totalS=entries.reduce((a,e)=>a+e.secs,0);
  const byCat=CAT_OPTIONS.map(c=>({cat:c,secs:entries.filter(e=>e.cat===c).reduce((a,e)=>a+e.secs,0)})).filter(x=>x.secs>0);
  const col = COLORS[settings.theme];
  const remainingSec = running && running.mode==="down" ? Math.max(0, running.totalSec - elapsed) : elapsed;
  const cdPct = running && running.mode==="down" ? Math.min(100, (elapsed/running.totalSec)*100) : 0;
  const nextMilestoneSec = 600 - (totalS % 600);

  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <div style={{display:"flex",justifyContent:"flex-end"}}><SettingsButton open={settingsOpen} onToggle={()=>setSettingsOpen(s=>!s)} color={settings.theme}/></div>
      {settingsOpen&&<Card>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <p style={{fontSize:13,fontWeight:500,color:"#888780",margin:0}}>Timer settings</p>
          <div style={{display:"flex",gap:8}}>
            <Pill active={settings.mode==="up"} onClick={()=>setSettings(s=>({...s,mode:"up"}))} color={settings.theme}>Count up</Pill>
            <Pill active={settings.mode==="down"} onClick={()=>setSettings(s=>({...s,mode:"down"}))} color={settings.theme}>Count down</Pill>
          </div>
          {settings.mode==="down"&&<div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:14,flex:1}}>Countdown length</span>
            <input type="number" value={settings.cdMinutes} min={1} max={180} onChange={e=>setSettings(s=>({...s,cdMinutes:Math.max(1,parseInt(e.target.value)||25)}))} style={{width:80}} />
            <span style={{fontSize:13,color:"#888780"}}>min</span>
          </div>}
          <div>
            <p style={{fontSize:14,marginBottom:8}}>Colour theme</p>
            <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
              {Object.keys(COLORS).map(t=>(
                <button key={t} onClick={()=>setSettings(s=>({...s,theme:t}))} style={{width:30,height:30,borderRadius:"50%",background:COLORS[t].mid,border:settings.theme===t?`3px solid ${COLORS[t].text}`:"3px solid transparent",cursor:"pointer",outline:"none",padding:0,boxShadow:settings.theme===t?`0 0 0 2px ${COLORS[t].bg}`:"none"}} />
              ))}
            </div>
          </div>
        </div>
      </Card>}
      <Card style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
        <Inp placeholder="Activity name" value={activity} onChange={setActivity} style={{flex:1,minWidth:140}} />
        <Sel value={cat} onChange={setCat} options={CAT_OPTIONS} />
        <button onClick={startStop} style={{borderRadius:14,padding:"8px 22px",background:running?COLORS.coral.mid:col.mid,color:"#fff",border:"none",fontWeight:500,fontSize:14,cursor:"pointer",minWidth:80}}>{running?"Stop":"Start"}</button>
      </Card>
      {running&&<Card style={{textAlign:"center",background:col.bg,border:`1px solid ${col.border}`}}>
        <p style={{fontSize:13,color:col.text,margin:"0 0 4px"}}>{running.mode==="down"?"Counting down":"Tracking"}: {running.activity}</p>
        <p style={{fontSize:36,fontWeight:500,margin:"4px 0",color:col.text,fontVariantNumeric:"tabular-nums"}}>{running.mode==="down"?fmtClock(remainingSec):fmt(elapsed)}</p>
        {running.mode==="down"&&<div className="bar-bg" style={{height:6,borderRadius:20,background:"#e8e6e0",overflow:"hidden",marginTop:8}}><div style={{height:"100%",width:`${cdPct}%`,background:col.mid,borderRadius:20,transition:"width 0.25s"}}/></div>}
      </Card>}
      <div style={{display:"flex",gap:12}}>
        {[{v:fmt(todayS),l:"today"},{v:fmt(totalS),l:"total"},{v:todayE.length,l:"sessions today"}].map(({v,l})=>
          <div key={l} className="metric" style={{flex:1,textAlign:"center",background:"#f1efe8",borderRadius:16,padding:"12px 8px"}}>
            <p style={{fontSize:22,fontWeight:500,margin:0}}>{v}</p>
            <p style={{fontSize:12,color:"#888780",margin:0}}>{l}</p>
          </div>)}
      </div>
      <p style={{fontSize:12,color:"#888780",textAlign:"center",margin:0}}>+{XP_PER_ACTION} XP every 10 minutes of tracked time · next in {Math.floor(nextMilestoneSec/60)}m {nextMilestoneSec%60}s</p>
      {byCat.length>0&&<Card>
        <p style={{fontSize:13,fontWeight:500,margin:"0 0 10px",color:"#888780"}}>Time by category</p>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {byCat.map(({cat:c,secs})=>{ const pct=totalS?Math.round(secs/totalS*100):0; const ccol=COLORS[CAT_COLOR[c]||"green"]; return(
            <div key={c}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:3}}><span>{c}</span><span style={{color:"#888780"}}>{fmt(secs)} · {pct}%</span></div>

            </div>);})}
        </div>
      </Card>}
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        <p style={{fontSize:13,fontWeight:500,color:"#888780"}}>Log</p>
        {entries.length===0&&<p style={{color:"#888780",fontSize:14,textAlign:"center",padding:"1.5rem 0"}}>No sessions logged yet</p>}
        {[...entries].reverse().map(e=>(
          <Card key={e.id} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 16px",borderRadius:16}}>
            <div style={{flex:1}}><span style={{fontSize:14}}>{e.activity}</span><span style={{marginLeft:8,fontSize:12,color:"#888780"}}>{e.date}</span></div>
            <Badge cat={e.cat} />
            <span style={{fontWeight:500,fontSize:14,minWidth:56,textAlign:"right"}}>{fmt(e.secs)}</span>

          </Card>))}
      </div>
    </div>
  );
}

// ============================================================
// HABITS  (7-day streak bonus, 5 XP for daily check)
// ============================================================
function Habits({ xpApi, awards }) {
  const [habits,setHabits]=useState(()=>load("pd_habits",[]));
  const [name,setName]=useState(""); const [cat,setCat]=useState("Health");
  const [settings,setSettings]=useState(()=>load("pd_habits_settings",{theme:"coral"}));
  const [settingsOpen,setSettingsOpen]=useState(false);
  const td=today();
  useEffect(()=>save("pd_habits",habits),[habits]);
  useEffect(()=>save("pd_habits_settings",settings),[settings]);

  function streak(c){ let s=0,d=new Date(); while(true){ const ds=d.toISOString().slice(0,10); if(c.includes(ds)){s++;d.setDate(d.getDate()-1);}else break; } return s; }

  function add(){ if(!name.trim()) return; setHabits(h=>[...h,{id:Date.now(),name:name.trim(),cat,completions:[]}]); setName(""); }

  function toggle(id){
    setHabits(prev=>prev.map(x=>{
      if(x.id!==id) return x;
      const d=x.completions.includes(td);
      const dayKey = `habit_${x.id}_${td}`;

      if(d){
        // uncheck
        if(awards.has(dayKey)){ xpApi.removeXP(XP_PER_ACTION); awards.remove(dayKey); }
        const newCompletions = x.completions.filter(c=>c!==td);
        // 7-day milestone refund: recompute milestones with new completions
        reconcileStreakAwards(x.id, newCompletions);
        return {...x,completions:newCompletions};
      } else {
        if(!awards.has(dayKey)){ xpApi.addXP(XP_PER_ACTION); awards.add(dayKey); }
        const newCompletions = [...x.completions, td];
        reconcileStreakAwards(x.id, newCompletions);
        return {...x,completions:newCompletions};
      }
    }));
  }

  // For a habit, count streak milestones earned: every 7 consecutive days = +5 XP.
  // milestone key = `habit_streak_<id>_<N>` for N=1,2,3...
  function reconcileStreakAwards(habitId, completions){
    // Streak length right now is what counts for milestones.
    // To be robust to date gaps, we award 1 milestone per 7-day run that has been ACHIEVED at any point.
    // Simpler & per-spec: milestones N = floor(currentStreak / 7).
    const s = streak(completions);
    const should = Math.floor(s/7);
    for(let i=1;i<=should;i++){
      const key=`habit_streak_${habitId}_${i}`;
      if(!awards.has(key)){ awards.add(key); xpApi.addXP(XP_PER_ACTION); }
    }
    let n = should+1;
    while(awards.has(`habit_streak_${habitId}_${n}`)){
      awards.remove(`habit_streak_${habitId}_${n}`);
      xpApi.removeXP(XP_PER_ACTION);
      n++;
    }
  }

  function remove(id){
    const h = habits.find(x=>x.id===id);
    if(h){
      // refund today's check if held
      const todayKey = `habit_${h.id}_${td}`;
      if(awards.has(todayKey)){ xpApi.removeXP(XP_PER_ACTION); awards.remove(todayKey); }
      // refund all streak milestones held for this habit
      let n=1;
      while(awards.has(`habit_streak_${h.id}_${n}`)){
        awards.remove(`habit_streak_${h.id}_${n}`);
        xpApi.removeXP(XP_PER_ACTION);
        n++;
      }
      // remove all other day awards for this habit silently (no refund — XP already came from totals)
      h.completions.forEach(d=>{
        if(d!==td) awards.remove(`habit_${h.id}_${d}`);
      });
    }
    setHabits(arr=>arr.filter(x=>x.id!==id));
  }

  const last7=Array.from({length:7},(_,i)=>{ const d=new Date(); d.setDate(d.getDate()-(6-i)); return d.toISOString().slice(0,10); });
  const doneToday=habits.filter(h=>h.completions.includes(td)).length;
  const col = COLORS[settings.theme];

  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <div style={{display:"flex",justifyContent:"flex-end"}}><SettingsButton open={settingsOpen} onToggle={()=>setSettingsOpen(s=>!s)} color={settings.theme}/></div>
      {settingsOpen&&<ThemeSettingsCard value={settings.theme} onChange={v=>setSettings(s=>({...s,theme:v}))} />}
      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        <Inp placeholder="New habit" value={name} onChange={setName} style={{flex:1,minWidth:160}} />
        <Sel value={cat} onChange={setCat} options={CAT_OPTIONS} />
        <button onClick={add} style={{borderRadius:14,padding:"8px 20px",background:col.mid,color:"#fff",border:"none",fontWeight:500,fontSize:14,cursor:"pointer"}}>Add</button>
      </div>
      <div style={{display:"flex",gap:12}}>
        {[{v:`${doneToday}/${habits.length}`,l:"done today"},{v:`${habits.length?Math.round(doneToday/habits.length*100):0}%`,l:"completion rate"},{v:habits.reduce((a,h)=>Math.max(a,streak(h.completions)),0),l:"best streak"}].map(({v,l})=>
          <div key={l} className="metric" style={{flex:1,textAlign:"center",background:"#f1efe8",borderRadius:16,padding:"12px 8px"}}>
            <p style={{fontSize:22,fontWeight:500,margin:0}}>{v}</p>
            <p style={{fontSize:12,color:"#888780",margin:0}}>{l}</p>
          </div>)}
      </div>
      <p style={{fontSize:12,color:"#888780",textAlign:"center",margin:0}}>+{XP_PER_ACTION} XP per check · bonus +{XP_PER_ACTION} XP every 7-day streak</p>
      {habits.length===0&&<p style={{color:"#888780",fontSize:14,textAlign:"center",padding:"1.5rem 0"}}>Add your first habit above</p>}
      {habits.map(h=>{
        const done=h.completions.includes(td); const s=streak(h.completions); const ccol=COLORS[CAT_COLOR[h.cat]||"green"];
        return <Card key={h.id}>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10,flexWrap:"wrap"}}>
            <button onClick={()=>toggle(h.id)} style={{width:28,height:28,borderRadius:50,border:`2px solid ${done?ccol.mid:"#d3d1c7"}`,background:done?ccol.mid:"transparent",cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:16}}>{done?"✓":""}</button>
            <span style={{flex:1,fontSize:15,minWidth:120}}>{h.name}</span>
            <Badge cat={h.cat} />
            {s>0&&<span style={{fontSize:13,color:COLORS.amber.text,background:COLORS.amber.bg,borderRadius:20,padding:"2px 10px",border:`1px solid ${COLORS.amber.border}`}}>{s} day streak</span>}
            <button onClick={()=>remove(h.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#888780",fontSize:18,lineHeight:1,padding:"2px 4px",borderRadius:8}}>×</button>
          </div>
          <div style={{display:"flex",gap:5}}>
            {last7.map(d=>{ const f=h.completions.includes(d); const it=d===td; return <div key={d} style={{flex:1,height:10,borderRadius:10,background:f?ccol.mid:"#e8e6e0",border:it?`1.5px solid ${ccol.border}`:"none"}}/>; })}
          </div>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
            {last7.map(d=><span key={d} style={{flex:1,fontSize:10,color:"#888780",textAlign:"center"}}>{"SMTWTFS"[new Date(d).getDay()]}</span>)}
          </div>
        </Card>;
      })}
    </div>
  );
}

function Hydration({ xpApi, awards }) {
  const [settings,setSettings]=useState(()=>load("pd_hydration",{portion:250,goal:2000,theme:"teal"}));
  const [log,setLog]=useState(()=>load("pd_hydration_log",[]));
  const [settingsOpen,setSettingsOpen]=useState(false);
  const td=today();
  useEffect(()=>save("pd_hydration",settings),[settings]);
  useEffect(()=>save("pd_hydration_log",log),[log]);
  const todayE=log.filter(e=>e.date===td);
  const todayMl=todayE.reduce((a,e)=>a+e.ml,0);
  const pct=Math.min(100,Math.round(todayMl/settings.goal*100));
  const col=COLORS[settings.theme]||COLORS.teal;

  useEffect(()=>{
    const key = `water_goal_${td}`;
    if(todayMl >= settings.goal && !awards.has(key)){ xpApi.addXP(XP_PER_ACTION); awards.add(key); }
    else if(todayMl < settings.goal && awards.has(key)){ xpApi.removeXP(XP_PER_ACTION); awards.remove(key); }
  // eslint-disable-next-line
  },[todayMl, settings.goal]);

  function addWater(){setLog(l=>[...l,{id:Date.now(),ml:settings.portion,date:td}]);}
  function removeWater(){if(!todayE.length)return;const last=todayE[todayE.length-1];setLog(l=>l.filter(e=>e.id!==last.id));}
  const cx=100,cy=100,r=85;
  const fillH=Math.round(r*2*pct/100);
  const fillY=(cy+r)-fillH;
  const textOnWater=pct>=52;
  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <div style={{display:"flex",justifyContent:"flex-end"}}><SettingsButton open={settingsOpen} onToggle={()=>setSettingsOpen(s=>!s)} color={settings.theme}/></div>
      {settingsOpen&&<Card>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <p style={{fontSize:13,fontWeight:500,color:"#888780",margin:0}}>Hydration settings</p>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:14,flex:1}}>Portion size</span>
            <Sel value={String(settings.portion)} onChange={v=>setSettings(s=>({...s,portion:parseInt(v)}))} options={["125","250","500"]} />
            <span style={{fontSize:13,color:"#888780"}}>ml</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:14,flex:1}}>Daily goal</span>
            <input type="number" value={settings.goal} min={250} max={10000} step={250} onChange={e=>setSettings(s=>({...s,goal:Math.max(250,parseInt(e.target.value)||2000)}))} style={{width:80}} />
            <span style={{fontSize:13,color:"#888780"}}>ml</span>
          </div>
          <div>
            <p style={{fontSize:14,marginBottom:8}}>Colour theme</p>
            <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
              {Object.keys(COLORS).map(t=>(
                <button key={t} onClick={()=>setSettings(s=>({...s,theme:t}))} style={{width:30,height:30,borderRadius:"50%",background:COLORS[t].mid,border:settings.theme===t?`3px solid ${COLORS[t].text}`:"3px solid transparent",cursor:"pointer",outline:"none",padding:0,boxShadow:settings.theme===t?`0 0 0 2px ${COLORS[t].bg}`:"none"}} />
              ))}
            </div>
          </div>
        </div>
      </Card>}
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:20,padding:"0.5rem 0"}}>
        <div style={{position:"relative",width:200,height:200}}>
          <svg width="200" height="200" viewBox="0 0 200 200">
            <defs><clipPath id="hydrationClip"><circle cx={cx} cy={cy} r={r}/></clipPath></defs>
            <circle cx={cx} cy={cy} r={r} fill={col.bg}/>
            {pct>0&&<path
              d={pct>=99
                ?`M ${cx-r} ${fillY} L ${cx+r} ${fillY} L ${cx+r} ${cy+r+2} L ${cx-r} ${cy+r+2} Z`
                :`M ${cx-r} ${fillY} Q ${cx-r/2} ${fillY-8} ${cx} ${fillY} Q ${cx+r/2} ${fillY+8} ${cx+r} ${fillY} L ${cx+r} ${cy+r+2} L ${cx-r} ${cy+r+2} Z`
              }
              fill={col.mid} opacity="0.55" clipPath="url(#hydrationClip)"
            />}
            <circle cx={cx} cy={cy} r={r} fill="none" stroke={col.border} strokeWidth="2.5"/>
          </svg>
          <div style={{position:"absolute",top:0,left:0,width:"100%",height:"100%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",pointerEvents:"none"}}>
            <span style={{fontSize:30,fontWeight:500,color:textOnWater?"#fff":col.text,lineHeight:1}}>{todayMl}</span>
            <span style={{fontSize:12,color:textOnWater?"rgba(255,255,255,0.8)":"#888780",marginTop:2}}>of {settings.goal} ml</span>
            {pct>=100&&<span style={{fontSize:11,marginTop:4,color:"#fff",fontWeight:500}}>Goal reached!</span>}
          </div>
        </div>
        <span style={{fontSize:13,color:col.text,background:col.bg,borderRadius:20,padding:"4px 14px",border:`1px solid ${col.border}`}}>{pct}% of daily goal</span>
        <div style={{display:"flex",alignItems:"center",gap:24}}>
          <button onClick={removeWater} disabled={!todayE.length} style={{width:52,height:52,borderRadius:"50%",background:"transparent",border:"1.5px solid #d3d1c7",color:"#888780",fontSize:26,cursor:todayE.length?"pointer":"default",display:"flex",alignItems:"center",justifyContent:"center",opacity:todayE.length?1:0.4}}>−</button>
          <div style={{textAlign:"center",minWidth:70}}>
            <p style={{fontSize:13,color:"#888780",margin:0}}>{settings.portion} ml</p>
            <p style={{fontSize:11,color:"#aaa8a2",margin:0}}>per tap</p>
          </div>
          <button onClick={addWater} style={{width:52,height:52,borderRadius:"50%",background:col.mid,border:"none",color:"#fff",fontSize:26,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
        </div>
      </div>
      <div style={{display:"flex",gap:12}}>
        {[{v:todayMl,l:"ml today"},{v:settings.goal,l:"ml goal"},{v:todayE.length,l:"portions"}].map(({v,l})=>
          <div key={l} className="metric" style={{flex:1,textAlign:"center",background:"#f1efe8",borderRadius:16,padding:"12px 8px"}}>
            <p style={{fontSize:22,fontWeight:500,margin:0}}>{v}</p>
            <p style={{fontSize:12,color:"#888780",margin:0}}>{l}</p>
          </div>)}
      </div>
    </div>
  );
}

const MOODS = [
  { key:"very_bad", label:"Very bad", color:"coral" },
  { key:"bad",      label:"Bad",      color:"amber" },
  { key:"neutral",  label:"Neutral",  color:"purple" },
  { key:"good",     label:"Good",     color:"teal" },
  { key:"excellent",label:"Excellent",color:"green" },
];

function MoodFace({ moodKey, size=44, glow=false }){
  const m = MOODS.find(x=>x.key===moodKey); if(!m) return null;
  const c = COLORS[m.color];
  let mouth;
  if(moodKey==="very_bad") mouth = <path d="M22 42 Q32 34 42 42" stroke={c.text} strokeWidth="2" fill="none" strokeLinecap="round"/>;
  else if(moodKey==="bad") mouth = <path d="M24 41 Q32 37 40 41" stroke={c.text} strokeWidth="2" fill="none" strokeLinecap="round"/>;
  else if(moodKey==="neutral") mouth = <line x1="24" y1="40" x2="40" y2="40" stroke={c.text} strokeWidth="2" strokeLinecap="round"/>;
  else if(moodKey==="good") mouth = <path d="M24 38 Q32 44 40 38" stroke={c.text} strokeWidth="2" fill="none" strokeLinecap="round"/>;
  else mouth = <path d="M22 36 Q32 48 42 36" stroke={c.text} strokeWidth="2" fill="none" strokeLinecap="round"/>;
  return <svg width={size} height={size} viewBox="0 0 64 64" style={{display:"block",filter:glow?`drop-shadow(0 0 4px ${c.mid})`:"none"}}>
    <circle cx="32" cy="32" r="26" fill={c.bg} stroke={c.border} strokeWidth="1.5"/>
    <circle cx="24" cy="28" r="2.5" fill={c.text}/>
    <circle cx="40" cy="28" r="2.5" fill={c.text}/>
    {moodKey==="excellent" && <>
      <path d="M14 22 Q12 18 16 18" stroke={c.mid} strokeWidth="1.5" fill="none"/>
      <path d="M50 22 Q52 18 48 18" stroke={c.mid} strokeWidth="1.5" fill="none"/>
    </>}
    {mouth}
  </svg>;
}

function MoodLogger() {
  const [entries,setEntries]=useState(()=>load("pd_mood",{}));
  const [settings,setSettings]=useState(()=>load("pd_mood_settings",{theme:"pink"}));
  const [settingsOpen,setSettingsOpen]=useState(false);
  const [viewMonth,setViewMonth]=useState(()=>{ const d=new Date(); return {y:d.getFullYear(),m:d.getMonth()}; });
  useEffect(()=>save("pd_mood",entries),[entries]);
  useEffect(()=>save("pd_mood_settings",settings),[settings]);
  const td = today();
  const todays = entries[td];
  function pick(key){ setEntries(e=>({...e, [td]:key})); }
  const col = COLORS[settings.theme];

  const firstDay = new Date(viewMonth.y, viewMonth.m, 1);
  const daysInMonth = new Date(viewMonth.y, viewMonth.m+1, 0).getDate();
  const startOffset = firstDay.getDay();
  const cells = [];
  for(let i=0;i<startOffset;i++) cells.push(null);
  for(let d=1; d<=daysInMonth; d++){
    const ds = `${viewMonth.y}-${String(viewMonth.m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    cells.push({ d, ds, mood: entries[ds] });
  }
  const monthName = new Date(viewMonth.y, viewMonth.m, 1).toLocaleString("en",{month:"long",year:"numeric"});
  function prevMonth(){ setViewMonth(v=>{ const m=v.m-1; if(m<0) return {y:v.y-1,m:11}; return {y:v.y,m}; }); }
  function nextMonth(){ setViewMonth(v=>{ const m=v.m+1; if(m>11) return {y:v.y+1,m:0}; return {y:v.y,m}; }); }

  const moodCounts = MOODS.map(m=>({...m, count:Object.values(entries).filter(v=>v===m.key).length}));
  const totalLogged = Object.keys(entries).length;

  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <div style={{display:"flex",justifyContent:"flex-end"}}><SettingsButton open={settingsOpen} onToggle={()=>setSettingsOpen(s=>!s)} color={settings.theme}/></div>

      <Card>
        <p style={{fontSize:13,fontWeight:500,color:"#888780",margin:"0 0 14px",textAlign:"center"}}>How are you feeling today?</p>
        <div style={{display:"flex",justifyContent:"space-between",gap:8,alignItems:"flex-end"}}>
          {MOODS.map(m=>(
            <button key={m.key} onClick={()=>pick(m.key)} style={{background:"none",border:"none",padding:0,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:4,flex:1,opacity:todays&&todays!==m.key?0.4:1,transform:todays===m.key?"scale(1.08)":"scale(1)",transition:"all 0.2s"}}>
              <MoodFace moodKey={m.key} size={48} glow={todays===m.key}/>
              <span style={{fontSize:11,color:todays===m.key?COLORS[m.color].text:"#888780",fontWeight:todays===m.key?500:400}}>{m.label}</span>
            </button>
          ))}
        </div>
        {todays&&<p style={{fontSize:12,color:"#888780",textAlign:"center",marginTop:14}}>Logged for today · tap a different face to change</p>}
      </Card>
      <Card>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
          <button onClick={prevMonth} style={{background:"none",border:"none",cursor:"pointer",fontSize:18,color:"#888780",padding:"2px 8px",borderRadius:8}}>‹</button>
          <p style={{fontSize:14,fontWeight:500,margin:0}}>{monthName}</p>
          <button onClick={nextMonth} style={{background:"none",border:"none",cursor:"pointer",fontSize:18,color:"#888780",padding:"2px 8px",borderRadius:8}}>›</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:6}}>
          {["S","M","T","W","T","F","S"].map((d,i)=><div key={i} style={{textAlign:"center",fontSize:10,color:"#aaa8a2"}}>{d}</div>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
          {cells.map((cell,i)=>{
            if(!cell) return <div key={i}/>;
            const isToday = cell.ds===td;
            return <div key={i} style={{minHeight:36,aspectRatio:"1/1",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",borderRadius:10,background:isToday?col.bg:"transparent",border:isToday?`1px solid ${col.border}`:"1px solid transparent",gap:1,padding:2}}>
              <span style={{fontSize:9,color:"#aaa8a2",lineHeight:1}}>{cell.d}</span>
              {cell.mood && <MoodFace moodKey={cell.mood} size={22}/>}
            </div>;
          })}
        </div>
      </Card>
      <Card>
        <p style={{fontSize:13,fontWeight:500,color:"#888780",margin:"0 0 10px"}}>All-time mood</p>
        <div style={{display:"flex",justifyContent:"space-between",gap:8}}>
          {moodCounts.map(m=>(
            <div key={m.key} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
              <MoodFace moodKey={m.key} size={28}/>
              <span style={{fontSize:14,fontWeight:500,color:COLORS[m.color].text}}>{m.count}</span>
            </div>
          ))}
        </div>
        <p style={{fontSize:11,color:"#aaa8a2",textAlign:"center",marginTop:10}}>{totalLogged} days logged</p>
      </Card>
    </div>
  );
}

function RoomBackground({ activeWall, activeFloor }){
  // Renders the full room area with the active wall (top 60%) and floor (bottom 40%).
  const wallId = `wallPat_${activeWall ? activeWall.design : "default"}_${activeWall && activeWall.plain ? "p":"t"}`;
  const floorId = `floorPat_${activeFloor ? activeFloor.design : "default"}_${activeFloor && activeFloor.plain ? "p":"t"}`;
  let wallFill = "#FBF9F3";
  let wallPattern = null;
  if(activeWall){
    if(activeWall.plain){
      wallFill = PLAIN_WALL_COLORS[activeWall.design];
    } else {
      const theme = TEX_WALL_THEMES[activeWall.design - 5];
      if(theme){
        wallFill = `url(#${wallId})`;
        wallPattern = <pattern id={wallId} x="0" y="0" width="48" height="48" patternUnits="userSpaceOnUse">
          <rect width="48" height="48" fill={theme.base}/>
          <g transform="translate(0,0)"><MotifTile motif={theme.motif} base={theme.base} accent={theme.accent}/></g>
          <g transform="translate(24,24)"><MotifTile motif={theme.motif} base={theme.base} accent={theme.accent}/></g>
        </pattern>;
      }
    }
  }
  let floorFill = "#E8E6DE";
  let floorPattern = null;
  if(activeFloor){
    if(activeFloor.plain){
      floorFill = PLAIN_FLOOR_COLORS[activeFloor.design];
    } else {
      const theme = TEX_FLOOR_THEMES[activeFloor.design - 5];
      if(theme){
        floorFill = `url(#${floorId})`;
        floorPattern = <pattern id={floorId} x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
          <FloorMotif motif={theme.motif} base={theme.base} accent={theme.accent}/>
        </pattern>;
      }
    }
  }
  return <svg width="100%" height="100%" viewBox="0 0 100 100" preserveAspectRatio="none" style={{position:"absolute",inset:0,borderRadius:20}}>
    <defs>{wallPattern}{floorPattern}</defs>
    <rect x="0" y="0" width="100" height="60" fill={wallFill}/>
    <rect x="0" y="60" width="100" height="40" fill={floorFill}/>
  </svg>;
}

function MySpace({ xpApi, onClose }) {
  const { inv, setInv, room, setRoom, xp, activeWall, setActiveWall, activeFloor, setActiveFloor } = xpApi;
  const [bagOpen,setBagOpen]=useState(false);
  const [bagTab,setBagTab]=useState("furniture"); // furniture / walls / floors / golden
  const roomRef = useRef(null);
  const [drag,setDrag]=useState(null);

  useEffect(()=>{
    if(!drag) return;
    function move(e){
      const ev = e.touches ? e.touches[0] : e;
      if(e.touches) e.preventDefault();
      setDrag(d=>d?{...d,x:ev.clientX,y:ev.clientY}:d);
    }
    function up(e){
      const ev = e.changedTouches ? e.changedTouches[0] : e;
      const x = ev.clientX, y = ev.clientY;
      // bag drop?
      const bag = document.getElementById("bag-icon");
      if(bag){
        const r = bag.getBoundingClientRect();
        if(x>=r.left && x<=r.right && y>=r.top && y<=r.bottom){
          if(drag.source==="room"){
            setRoom(rm=>{
              const item = rm.find(i=>i.id===drag.id);
              if(item){ setInv(iv=>[...iv,{id:item.id,level:item.level,kind:item.kind,design:item.design,plain:item.plain}]); }
              return rm.filter(i=>i.id!==drag.id);
            });
          }
          setDrag(null); return;
        }
      }
      // dropped on room area?
      if(roomRef.current){
        const r = roomRef.current.getBoundingClientRect();
        if(x>=r.left && x<=r.right && y>=r.top && y<=r.bottom){
          if(drag.kind==="wallpaper"){
            // apply wallpaper
            setActiveWall({level:drag.level, design:drag.design, plain:drag.plain});
            // remove from inventory
            setInv(iv=>iv.filter(i=>i.id!==drag.id));
            setDrag(null); return;
          }
          if(drag.kind==="floor"){
            setActiveFloor({level:drag.level, design:drag.design, plain:drag.plain});
            setInv(iv=>iv.filter(i=>i.id!==drag.id));
            setDrag(null); return;
          }
          // furniture / golden: position into room
          const px = ((x - r.left - drag.offsetX) / r.width) * 100;
          const py = ((y - r.top - drag.offsetY) / r.height) * 100;
          const clampedX = Math.max(0, Math.min(85, px));
          const clampedY = Math.max(0, Math.min(85, py));
          if(drag.source==="inv"){
            setInv(iv=>{
              const item = iv.find(i=>i.id===drag.id);
              if(item){ setRoom(rm=>[...rm,{id:item.id,level:item.level,kind:item.kind,design:item.design,x:clampedX,y:clampedY}]); }
              return iv.filter(i=>i.id!==drag.id);
            });
          } else {
            setRoom(rm=>rm.map(i=>i.id===drag.id?{...i,x:clampedX,y:clampedY}:i));
          }
        }
      }
      setDrag(null);
    }
    window.addEventListener("mousemove",move);
    window.addEventListener("mouseup",up);
    window.addEventListener("touchmove",move,{passive:false});
    window.addEventListener("touchend",up);
    return ()=>{
      window.removeEventListener("mousemove",move);
      window.removeEventListener("mouseup",up);
      window.removeEventListener("touchmove",move);
      window.removeEventListener("touchend",up);
    };
  },[drag]);

  function startDrag(e, item, source){
    e.preventDefault();
    const ev = e.touches ? e.touches[0] : e;
    const rect = e.currentTarget.getBoundingClientRect();
    setDrag({
      id:item.id, level:item.level, kind:item.kind, design:item.design, plain:item.plain, source,
      x:ev.clientX, y:ev.clientY,
      offsetX: ev.clientX - rect.left,
      offsetY: ev.clientY - rect.top,
      size: rect.width
    });
  }

  // group inventory by kind for the bag tabs
  const invFurn   = inv.filter(i=>i.kind==="furniture");
  const invGold   = inv.filter(i=>i.kind==="golden");
  const invWalls  = inv.filter(i=>i.kind==="wallpaper");
  const invFloors = inv.filter(i=>i.kind==="floor");
  const tabs = [
    {key:"furniture", label:`Furniture (${invFurn.length})`, items:invFurn},
    {key:"walls",     label:`Walls (${invWalls.length})`, items:invWalls},
    {key:"floors",    label:`Floors (${invFloors.length})`, items:invFloors},
    {key:"golden",    label:`Golden (${invGold.length})`, items:invGold},
  ];
  const currentTab = tabs.find(t=>t.key===bagTab) || tabs[0];

  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <p style={{fontSize:13,color:"#888780",margin:0}}>Level <span style={{color:COLORS.purple.text,fontWeight:500}}>{xp.level}</span> · {xp.xp}/{XP_PER_LEVEL} XP to next</p>
        <button onClick={onClose} style={{background:"transparent",border:"1px solid #d3d1c7",borderRadius:20,padding:"4px 12px",fontSize:12,color:"#888780",cursor:"pointer"}}>Back to dashboard</button>
      </div>

      {/* Room — use padding-bottom hack for guaranteed square in any browser */}
      <div style={{position:"relative",width:"100%",paddingBottom:"100%",borderRadius:20,border:"0.5px solid #d3d1c7",overflow:"hidden",touchAction:"none"}}>
        <div ref={roomRef} style={{position:"absolute",inset:0}}>
          <RoomBackground activeWall={activeWall} activeFloor={activeFloor}/>
          {/* wall/floor divider */}
          <div style={{position:"absolute",left:0,right:0,top:"60%",height:1,background:"rgba(0,0,0,0.08)"}}/>
          {room.length===0 && <div style={{position:"absolute",left:"10%",right:"10%",top:"40%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",color:"#665f55",fontSize:13,textAlign:"center",padding:"10px 16px",background:"rgba(255,255,255,0.65)",borderRadius:14}}>
            <span>Your room is empty.</span>
            <span style={{marginTop:4,fontSize:12,color:"#888780"}}>Open the bag and drag furniture in.</span>
          </div>}
          {room.map(item=>(
            <div key={item.id} className="furn-item"
                 onMouseDown={e=>startDrag(e,item,"room")}
                 onTouchStart={e=>startDrag(e,item,"room")}
                 style={{position:"absolute",left:`${item.x}%`,top:`${item.y}%`,width:"15%",height:"15%",cursor:"grab",opacity:drag&&drag.id===item.id?0.3:1,display:"flex",alignItems:"center",justifyContent:"center",zIndex:2}}>
              <div style={{width:"100%",height:"100%"}}>
                {item.kind==="golden"
                  ? <GoldSVG design={item.design} size="100%"/>
                  : <FurnSVG design={item.design} size="100%"/>}
              </div>
            </div>
          ))}
          <button id="bag-icon" onClick={()=>setBagOpen(o=>!o)} style={{position:"absolute",left:12,bottom:12,width:46,height:46,borderRadius:"50%",background:bagOpen?COLORS.amber.bg:"#fff",border:`1.5px solid ${bagOpen?COLORS.amber.border:"#d3d1c7"}`,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 2px 6px rgba(0,0,0,0.1)",zIndex:5,padding:0}}>
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={COLORS.amber.text} strokeWidth="1.6">
              <path d="M6 8h12l-1 12H7L6 8z"/>
              <path d="M9 8V6a3 3 0 0 1 6 0v2"/>
            </svg>
            {inv.length>0&&<span style={{position:"absolute",top:-4,right:-4,background:COLORS.coral.mid,color:"#fff",fontSize:10,borderRadius:20,minWidth:18,height:18,padding:"0 5px",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:500}}>{inv.length}</span>}
          </button>
        </div>
      </div>

      {bagOpen && <Card>
        <div style={{display:"flex",gap:6,marginBottom:12,overflowX:"auto"}}>
          {tabs.map(t=><Pill key={t.key} active={bagTab===t.key} onClick={()=>setBagTab(t.key)} color="amber">{t.label}</Pill>)}
        </div>
        {currentTab.items.length===0
          ? <p style={{fontSize:13,color:"#aaa8a2",textAlign:"center",padding:"1rem 0"}}>Level up to unlock {bagTab}</p>
          : <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(74px, 1fr))",gap:10}}>
              {currentTab.items.map(item=>(
                <div key={item.id} className="furn-item"
                     onMouseDown={e=>startDrag(e,item,"inv")}
                     onTouchStart={e=>startDrag(e,item,"inv")}
                     style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,padding:8,borderRadius:14,background:"#faf7ef",border:"1px solid #e0ddd0",cursor:"grab",opacity:drag&&drag.id===item.id?0.3:1}}>
                  <InventoryItemPreview it={item} size={42}/>
                  <span style={{fontSize:9,color:"#665f55",textAlign:"center",lineHeight:1.1}}>{inventoryItemName(item)}</span>
                  <span style={{fontSize:9,color:"#888780"}}>Lv {item.level}</span>
                </div>
              ))}
            </div>}
        {(activeWall || activeFloor) && <div style={{marginTop:12,paddingTop:12,borderTop:"1px solid #e8e6e0",display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
          <p style={{fontSize:11,color:"#888780",margin:0,width:"100%"}}>Active surfaces (tap to remove):</p>
          {activeWall && <button onClick={()=>{
            // return active wall to inventory
            setInv(iv=>[...iv,{id:`item_back_wall_${Date.now()}`,level:activeWall.level,kind:"wallpaper",design:activeWall.design,plain:activeWall.plain}]);
            setActiveWall(null);
          }} style={{display:"flex",alignItems:"center",gap:6,padding:"4px 10px",borderRadius:14,background:"#faf7ef",border:"1px solid #e0ddd0",cursor:"pointer"}}>
            <WallSwatch design={activeWall.design} plain={activeWall.plain} size={24}/>
            <span style={{fontSize:11,color:"#665f55"}}>Wall</span>
          </button>}
          {activeFloor && <button onClick={()=>{
            setInv(iv=>[...iv,{id:`item_back_floor_${Date.now()}`,level:activeFloor.level,kind:"floor",design:activeFloor.design,plain:activeFloor.plain}]);
            setActiveFloor(null);
          }} style={{display:"flex",alignItems:"center",gap:6,padding:"4px 10px",borderRadius:14,background:"#faf7ef",border:"1px solid #e0ddd0",cursor:"pointer"}}>
            <FloorSwatch design={activeFloor.design} plain={activeFloor.plain} size={24}/>
            <span style={{fontSize:11,color:"#665f55"}}>Floor</span>
          </button>}
        </div>}
      </Card>}

      {drag && <div style={{position:"fixed",left:drag.x-drag.offsetX,top:drag.y-drag.offsetY,width:drag.size,height:drag.size,pointerEvents:"none",zIndex:9999,opacity:0.9}}>
        {drag.kind==="furniture" && <FurnSVG design={drag.design} size={drag.size}/>}
        {drag.kind==="golden"    && <GoldSVG design={drag.design} size={drag.size}/>}
        {drag.kind==="wallpaper" && <WallSwatch design={drag.design} plain={drag.plain} size={drag.size}/>}
        {drag.kind==="floor"     && <FloorSwatch design={drag.design} plain={drag.plain} size={drag.size}/>}
      </div>}
    </div>
  );
}

function Progress({ xpApi }) {
  const { xp } = xpApi;
  const habits = load("pd_habits",[]);
  const entries = load("pd_time",[]);
  const hydrationSettings = load("pd_hydration",{portion:250,goal:2000,theme:"teal"});
  const hydrationLog = load("pd_hydration_log",[]);
  const td = today();
  function streak(c){ let s=0,d=new Date(); while(true){ const ds=d.toISOString().slice(0,10); if(c.includes(ds)){s++;d.setDate(d.getDate()-1);}else break; } return s; }
  const longestStreak = habits.reduce((a,h)=>Math.max(a,streak(h.completions)),0);
  const totalFocusSec = entries.reduce((a,e)=>a+e.secs,0);
  const totalFocusHours = (totalFocusSec/3600).toFixed(1);
  const waterToday = hydrationLog.filter(e=>e.date===td).reduce((a,e)=>a+e.ml,0);
  const xpPct = Math.round((xp.xp/XP_PER_LEVEL)*100);
  const stats = [
    { label:"Total focus", value:`${totalFocusHours}h`, sub:"all sessions", color:"teal" },
    { label:"Longest streak", value:`${longestStreak}`, sub:"days", color:"coral" },
    { label:"Water today", value:`${waterToday}`, sub:`of ${hydrationSettings.goal} ml`, color:"sky" },
    { label:"Level", value:`${xp.level}`, sub:`of ${MAX_LEVEL}`, color:"purple" },
  ];
  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:12}}>
        {stats.map(s=>{
          const c = COLORS[s.color];
          return <Card key={s.label} style={{display:"flex",flexDirection:"column",gap:4,background:c.bg,border:`1px solid ${c.border}`}}>
            <p style={{fontSize:12,color:c.text,margin:0,opacity:0.8}}>{s.label}</p>
            <p style={{fontSize:28,fontWeight:500,margin:0,color:c.text}}>{s.value}</p>
            <p style={{fontSize:11,color:c.text,margin:0,opacity:0.6}}>{s.sub}</p>
          </Card>;
        })}
      </div>
      <Card>
        <div style={{display:"flex",alignItems:"baseline",justifyContent:"space-between",marginBottom:8}}>
          <p style={{fontSize:13,fontWeight:500,color:"#888780",margin:0}}>XP to next level</p>
          <p style={{fontSize:13,color:COLORS.purple.text,margin:0,fontWeight:500}}>{xp.xp} / {XP_PER_LEVEL}</p>
        </div>
        <div className="bar-bg" style={{height:14,borderRadius:20,background:"#e8e6e0",overflow:"hidden"}}>
          <div style={{height:"100%",width:`${xpPct}%`,background:`linear-gradient(90deg, ${COLORS.purple.mid}, ${COLORS.pink.mid})`,borderRadius:20,transition:"width 0.4s"}}/>
        </div>
        <p style={{fontSize:11,color:"#aaa8a2",marginTop:8,textAlign:"center"}}>
          {xp.level>=MAX_LEVEL ? "Maximum level reached! ✨" : `${XP_PER_LEVEL-xp.xp} XP until level ${xp.level+1}`}
        </p>
      </Card>
      <Card>
        <p style={{fontSize:13,fontWeight:500,color:"#888780",margin:"0 0 6px"}}>How XP works</p>
        <p style={{fontSize:12,color:"#888780",lineHeight:1.6,margin:0}}>
          You earn {XP_PER_ACTION} XP per todo completed, habit checked, daily water goal reached, every 10 minutes of focus time (any combination), and every 7-day habit streak. Un-checking returns the XP. Once a todo is archived, crossing it off there is just tidying — no XP penalty.
        </p>
      </Card>
    </div>
  );
}

function LevelUpOverlay({ flash, onClose }){
  if(!flash) return null;
  const isLv30 = flash.milestone==="lv30";
  const isLv40 = flash.milestone==="lv40";
  const isLv100 = flash.milestone==="lv100";

  // Stars for the lv30 animation
  const stars = Array.from({length:14}).map((_,i)=>{
    const a = (i/14)*Math.PI*2;
    const r = 100 + (i%3)*30;
    return { x: 50 + Math.cos(a)*r/4, y: 50 + Math.sin(a)*r/4, delay: (i*0.1).toFixed(2) };
  });

  return <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",backdropFilter:"blur(4px)",zIndex:10000,display:"flex",alignItems:"center",justifyContent:"center",animation:"fadeUp 0.3s ease-out",padding:20}}>
    <div onClick={e=>e.stopPropagation()} style={{position:"relative",width:"100%",maxWidth:340,background:"#fff",borderRadius:24,padding:"2.5rem 1.5rem",textAlign:"center",animation:"celebPop 0.6s cubic-bezier(.4,1.4,.5,1)"}}>
      {isLv100 ? <>
        <div style={{display:"flex",justifyContent:"center",gap:6,marginBottom:14}}>
          {[0,1,2,3,4].map(i=><div key={i} style={{animation:`celebPop 0.7s ease-out ${i*0.12}s both`}}><GoldSVG design={i} size={44}/></div>)}
        </div>
        <p style={{fontSize:14,color:COLORS.amber.text,fontWeight:500,margin:"0 0 6px",letterSpacing:1}}>LEVEL 100</p>
        <p style={{fontSize:22,fontWeight:600,margin:"0 0 10px",background:"linear-gradient(90deg, #B8860B, #E9C46A, #B8860B)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text"}}>You're an expert.</p>
        <p style={{fontSize:13,color:"#666",lineHeight:1.5,margin:"0 0 16px"}}>One hundred levels of focus, habits, and care. You've unlocked the golden set — five rare pieces just for you.</p>
        <button onClick={onClose} style={{borderRadius:14,padding:"8px 22px",background:COLORS.amber.mid,color:"#fff",border:"none",fontWeight:500,fontSize:14,cursor:"pointer"}}>Amazing</button>
      </> : isLv30 ? <>
        <div style={{position:"relative",height:120,marginBottom:8}}>
          {stars.map((s,i)=>(
            <svg key={i} width="20" height="20" viewBox="0 0 24 24" style={{position:"absolute",left:`${s.x}%`,top:`${s.y}%`,transform:"translate(-50%,-50%)",animation:`starTwinkle 1.4s ease-in-out ${s.delay}s infinite`}}>
              <path d="M12 2 L14 9 L21 9 L15.5 13.5 L17.5 21 L12 16.5 L6.5 21 L8.5 13.5 L3 9 L10 9 Z" fill={COLORS.amber.mid}/>
            </svg>
          ))}
          <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
            <p style={{fontSize:48,fontWeight:600,margin:0,color:COLORS.purple.text}}>Lv 30</p>
          </div>
        </div>
        <p style={{fontSize:13,color:"#666",margin:"0 0 16px",lineHeight:1.5}}>Wallpapers and floors are unlocked! Find them in your bag.</p>
        <button onClick={onClose} style={{borderRadius:14,padding:"8px 22px",background:COLORS.purple.mid,color:"#fff",border:"none",fontWeight:500,fontSize:14,cursor:"pointer"}}>Continue</button>
      </> : isLv40 ? <>
        <p style={{fontSize:36,fontWeight:600,margin:"0 0 8px",color:COLORS.teal.text}}>Lv 40</p>
        <p style={{fontSize:13,color:"#666",margin:"0 0 16px",lineHeight:1.5}}>Textured wallpapers and floors are now unlocking — wood, marble, animals, and more.</p>
        <button onClick={onClose} style={{borderRadius:14,padding:"8px 22px",background:COLORS.teal.mid,color:"#fff",border:"none",fontWeight:500,fontSize:14,cursor:"pointer"}}>Nice</button>
      </> : <>
        <p style={{fontSize:36,fontWeight:600,margin:"0 0 8px",color:COLORS.purple.text}}>Lv {flash.level}</p>
        <p style={{fontSize:13,color:"#666",margin:"0 0 16px"}}>New item unlocked in your bag!</p>
        <button onClick={onClose} style={{borderRadius:14,padding:"8px 22px",background:COLORS.purple.mid,color:"#fff",border:"none",fontWeight:500,fontSize:14,cursor:"pointer"}}>Cool</button>
      </>}
    </div>
  </div>;
}

      <div style={{marginBottom:"1rem",display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:11,color:"#888780",fontWeight:500,minWidth:42}}>Lv {xpApi.xp.level}</span>
        <div className="bar-bg" style={{flex:1,height:6,borderRadius:20,background:"#e8e6e0",overflow:"hidden"}}>
          <div style={{height:"100%",width:`${(xpApi.xp.xp/XP_PER_LEVEL)*100}%`,background:`linear-gradient(90deg, ${COLORS.purple.mid}, ${COLORS.pink.mid})`,borderRadius:20,transition:"width 0.4s"}}/>
        </div>
        <span style={{fontSize:11,color:"#888780",minWidth:48,textAlign:"right"}}>{xpApi.xp.xp}/{XP_PER_LEVEL}</span>
      </div>

      {/* Shrinkable tab bar — all on one line, never wraps */}
      <div className="tab-bar" style={{background:"#ebe9e2",borderRadius:40,padding:"5px 6px",marginBottom:"1.25rem"}}>
        <div className="tab-bar-inner">
          {[
            ["todos","To-do"],
            ["time","Time"],
            ["habits","Habits"],
            ["hydration","Water"],
            ["mood","Mood"],
            ["progress","Progress"],
          ].map(([k,label])=>{
            const active = tab===k;
            return <button key={k} className="tab-btn" onClick={()=>setTab(k)} style={{
              border: active?"1.5px solid #b4b2a9":"1.5px solid transparent",
              background: active?"#fff":"transparent",
              color: active?"#1a1a18":"#888780",
              fontWeight: active?500:400,
            }}>{label}</button>;
          })}
        </div>
      </div>

      {tab==="todos"&&<Todos xpApi={xpApi} awards={awards}/>}
      {tab==="time"&&<TimeTracker xpApi={xpApi} awards={awards}/>}
      {tab==="habits"&&<Habits xpApi={xpApi} awards={awards}/>}
      {tab==="hydration"&&<Hydration xpApi={xpApi} awards={awards}/>}
      {tab==="mood"&&<MoodLogger/>}
      {tab==="progress"&&<Progress xpApi={xpApi}/>}

      <LevelUpOverlay flash={xpApi.flash} onClose={()=>xpApi.setFlash(null)}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
